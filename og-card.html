<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #F5F1E8;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center;
}

.card {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 72px 88px;
  position: relative;
}

/* Grid decoration - right side */
.grid-deco {
  position: absolute;
  right: 88px; top: 50%; transform: translateY(-50%);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.grid-cell {
  width: 92px; height: 92px;
  border-radius: 4px;
  background: #DDD8CC;
}
.grid-cell.filled { background: #C8401A; opacity: 0.85; }
.grid-cell.filled-2 { background: #E8602A; opacity: 0.7; }
.grid-cell.filled-3 { background: #A03314; opacity: 0.9; }
.grid-cell.light { background: #E8E4DA; }
.grid-cell.mid { background: #C8C4BA; }

.content {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 24px;
  z-index: 1;
  max-width: 580px;
}

.tag {
  font-size: 13px; font-weight: 500;
  color: #9C9890; letter-spacing: 0.14em;
  text-transform: uppercase;
}

.title {
  font-family: 'Syne', sans-serif;
  font-size: 108px; font-weight: 800;
  color: #111110;
  line-height: 0.9;
  letter-spacing: -0.03em;
}

.desc {
  font-size: 22px; font-weight: 400;
  color: #58544C; line-height: 1.45;
  max-width: 460px;
}

.divider {
  width: 40px; height: 2px;
  background: #C8401A;
}

.url {
  font-size: 14px; color: #9C9890; letter-spacing: 0.04em;
}

/* subtle grain texture */
.grain {
  position: absolute; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="card">
  <div class="grain"></div>

  <div class="content">
    <span class="tag">Wikimedia × Puzzle</span>
    <div class="title">Pix<br>Jig</div>
    <div class="divider"></div>
    <p class="desc">Memorize the image.<br>Solve the puzzle.</p>
    <span class="url">uhsmt.github.io/pixjig</span>
  </div>

  <div class="grid-deco">
    <div class="grid-cell filled"></div>
    <div class="grid-cell light"></div>
    <div class="grid-cell mid"></div>
    <div class="grid-cell filled-2"></div>

    <div class="grid-cell mid"></div>
    <div class="grid-cell filled-3"></div>
    <div class="grid-cell light"></div>
    <div class="grid-cell mid"></div>

    <div class="grid-cell light"></div>
    <div class="grid-cell mid"></div>
    <div class="grid-cell filled"></div>
    <div class="grid-cell light"></div>

    <div class="grid-cell filled-2"></div>
    <div class="grid-cell light"></div>
    <div class="grid-cell mid"></div>
    <div class="grid-cell filled-3"></div>
  </div>
</div>
</body>
</html>
