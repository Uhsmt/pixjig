<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixJig — Memorize the image. Solve the puzzle.</title>
<meta name="description" content="Wikimedia の写真を使ったジグソーパズル。画像を覚えて、ピースを並べよう。">

<!-- Open Graph -->
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://uhsmt.github.io/pixjig/">
<meta property="og:title"       content="PixJig — Memorize the image. Solve the puzzle.">
<meta property="og:description" content="Wikimedia の写真を使ったジグソーパズル。画像を覚えて、ピースを並べよう。">
<meta property="og:image"       content="https://uhsmt.github.io/pixjig/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="PixJig — Memorize the image. Solve the puzzle.">
<meta name="twitter:description" content="Wikimedia の写真を使ったジグソーパズル。画像を覚えて、ピースを並べよう。">
<meta name="twitter:image"       content="https://uhsmt.github.io/pixjig/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #F5F1E8;
    --surface:     #FDFCF9;
    --border:      #DDD8CC;
    --border-mid:  #C0BAB0;
    --text:        #111110;
    --text-mid:    #58544C;
    --text-faint:  #9C9890;
    --accent:      #C8401A;
    --accent-dark: #A03314;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  .screen { display: none; width: 100%; max-width: 520px; padding: 2rem 1.5rem; }
  .screen.active {
    display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
    max-height: 100dvh; overflow-y: auto;
  }

  /* ===== Setup ===== */
  #screen-setup { animation: fadeIn 0.35s ease; }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.4rem, 8vw, 3.2rem);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
    align-self: flex-start;
  }

  label {
    font-size: 0.68rem; font-weight: 600; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.1em;
    align-self: flex-start; width: 100%;
  }

  textarea {
    width: 100%; height: 52px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; color: var(--text); font-size: 0.9rem;
    padding: 0.65rem 0.85rem; resize: none; outline: none;
    transition: border-color 0.15s; font-family: 'DM Sans', sans-serif;
  }
  textarea::placeholder { color: var(--text-faint); }
  textarea:focus { border-color: var(--text); }

  .difficulty-group { display: flex; gap: 0.5rem; width: 100%; }
  .diff-btn {
    flex: 1; padding: 0.6rem 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; color: var(--text-mid);
    font-size: 0.82rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.12s; line-height: 1.4;
  }
  .diff-btn small { font-size: 0.68rem; color: var(--text-faint); display: block; font-weight: 400; }
  .diff-btn:hover { border-color: var(--text); color: var(--text); }
  .diff-btn.selected { background: var(--text); border-color: var(--text); color: #fff; }
  .diff-btn.selected small { color: rgba(255,255,255,0.5); }

  .btn-primary {
    width: 100%; padding: 0.85rem;
    background: var(--text); border: none; border-radius: 3px;
    color: #fff; font-size: 0.9rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { background: var(--border); color: var(--text-faint); cursor: not-allowed; }

  .examples { width: 100%; display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .example-chip {
    padding: 0.26rem 0.6rem;
    background: transparent; border: 1px solid var(--border); border-radius: 2px;
    font-size: 0.72rem; color: var(--text-mid);
    cursor: pointer; transition: all 0.12s;
    font-family: 'DM Sans', sans-serif;
  }
  .example-chip:hover { border-color: var(--text); color: var(--text); background: var(--surface); }

  /* ===== Loading ===== */
  #screen-loading { gap: 2rem; animation: fadeIn 0.3s ease; }
  .spinner-wrap { position: relative; width: 40px; height: 40px; }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 0.9rem; color: var(--text); font-weight: 500; text-align: center; }
  .loading-sub  { font-size: 0.75rem; color: var(--text-mid); text-align: center; }

  /* ===== Game ===== */
  #screen-game { max-width: 680px; gap: 0.6rem; animation: fadeIn 0.35s ease; }

  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; gap: 0.5rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .stat-box {
    display: flex; align-items: baseline; gap: 0.3rem;
  }
  .stat-label { font-size: 0.62rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.09em; font-weight: 500; }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .btn-small {
    padding: 0.38rem 0.7rem;
    background: transparent; border: 1px solid var(--border); border-radius: 2px;
    color: var(--text-mid); font-size: 0.75rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }
  .btn-small:hover { border-color: var(--text); color: var(--text); }

  .board-wrap { position: relative; width: 100%; }

  #board {
    display: grid;
    width: 100%;
    gap: 0;
    border-radius: 2px;
    overflow: hidden;
    background: var(--border);
    touch-action: none;
    user-select: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  /* ===== Piece ===== */
  .piece {
    position: relative;
    cursor: grab;
    /* No border — separation is via inset box-shadow so joined pieces have zero gap */
    transition: transform 0.1s, opacity 0.1s, box-shadow 0.1s;
    background-color: #EDE9DF;
  }
  .piece:active { cursor: grabbing; }

  .piece.dragging  { opacity: 0.3; transform: scale(1.04); z-index: 10; }
  .piece.drag-over { outline: 3px solid var(--accent); outline-offset: -2px; box-shadow: inset 0 0 0 3px var(--accent) !important; }

  /* Clear wave animation */
  .piece.wave-anim {
    animation: wavePop 0.65s ease forwards;
    animation-delay: calc(var(--piece-index) * 0.06s);
  }


  /* Attribution */
  .attribution { font-size: 0.63rem; color: var(--text-faint); text-align: right; width: 100%; }
  .attribution a { color: var(--text-mid); text-decoration: none; }
  .attribution a:hover { color: var(--accent); }

  /* ===== Preview Countdown Overlay ===== */
  #overlay-preview {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,8,0.88);
    z-index: 60;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.2rem;
    pointer-events: none;
  }
  #overlay-preview.active { display: flex; }

  #preview-full-img {
    max-width: min(88vw, 400px);
    max-height: 55vh;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  .preview-count-badge { display: flex; flex-direction: column; align-items: center; gap: 0.65rem; }
  .preview-count-msg {
    font-size: 0.72rem; font-weight: 600; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 0.12em;
  }
  .countdown-circle {
    width: 68px; height: 68px;
    border: 1.5px solid rgba(255,255,255,0.5); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem; font-weight: 700; color: #fff;
    transition: transform 0.15s;
  }
  .countdown-circle.tick { animation: countTick 0.3s cubic-bezier(0.34,1.56,0.64,1); }

  /* ===== Clear Overlay ===== */
  #overlay-clear {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.1rem;
    overflow-y: auto;
    padding: 2rem 1.5rem;
  }
  #overlay-clear.active { display: flex; }

  #overlay-img-bg {
    position: absolute; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    opacity: 0.13; filter: blur(4px) saturate(0.8);
    pointer-events: none;
  }
  #overlay-clear > *:not(#overlay-img-bg) { position: relative; z-index: 1; }

  .clear-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.8rem, 10vw, 5rem); font-weight: 800;
    text-transform: uppercase; letter-spacing: -0.04em;
    color: var(--text); line-height: 1; text-align: center;
    animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both,
               tada 0.7s 0.55s ease both;
  }

  /* Stars */
  .clear-stars-row { display: flex; gap: 0.2rem; justify-content: center; }
  .clear-star {
    display: inline-block; font-size: 2.4rem; line-height: 1;
    animation: starPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .clear-star:nth-child(1) { animation-delay: 0.1s; }
  .clear-star:nth-child(2) { animation-delay: 0.26s; }
  .clear-star:nth-child(3) { animation-delay: 0.42s; }

  /* Score */
  .clear-score-row { display: flex; align-items: center; justify-content: center; gap: 0.9rem; }
  .clear-score-text { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
  .clear-score-label { font-size: 0.62rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }

  #clear-thumb {
    width: 36px; height: 36px;
    object-fit: cover; border-radius: 3px;
    border: 1.5px solid var(--border);
    cursor: zoom-in;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  #clear-thumb:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  .clear-score-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.4rem, 9vw, 3.8rem); font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
  }

  .clear-stats {
    display: flex; gap: 2rem; text-align: center;
    padding: 0.7rem 1.5rem;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    width: 100%; max-width: 320px; justify-content: center;
  }
  .clear-stat  { display: flex; flex-direction: column; gap: 0.18rem; }
  .clear-stat-label { font-size: 0.6rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .clear-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 700; color: var(--text); }
  .clear-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 360px; }
  .btn-retry { background: var(--accent); }
  .btn-retry:hover { background: var(--accent-dark) !important; }

  /* Lightbox */
  #overlay-lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(8,8,6,0.92);
    align-items: center; justify-content: center;
    cursor: zoom-out;
    animation: fadeIn 0.18s ease;
  }
  #overlay-lightbox.active { display: flex; }
  #lightbox-img {
    max-width: min(92vw, 600px);
    max-height: 88vh;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 16px 60px rgba(0,0,0,0.7);
    animation: scaleIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes scaleIn { from { opacity:0; transform: scale(0.88); } to { opacity:1; transform: scale(1); } }

  /* Score breakdown */
  .score-breakdown {
    background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    padding: 0.7rem 0.9rem; width: 100%; max-width: 320px;
    display: flex; flex-direction: column; gap: 0.38rem; font-size: 0.78rem;
  }
  .bd-row { display: flex; align-items: center; gap: 0.4rem; }
  .bd-label { color: var(--text-mid); min-width: 3em; font-size: 0.72rem; }
  .bd-val   { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); min-width: 3.2em; text-align: right; font-size: 0.72rem; }
  .bd-arr   { color: var(--text-faint); }
  .bd-mult  { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.78rem; min-width: 3.6em; }
  .bd-par   { color: var(--text-faint); font-size: 0.68rem; margin-left: auto; }
  .bd-formula {
    border-top: 1px solid var(--border); margin-top: 0.08rem; padding-top: 0.38rem;
    text-align: right; color: var(--text-mid); font-size: 0.72rem; line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }
  .bd-formula strong { color: var(--text); font-size: 0.8rem; }

  .error-msg {
    color: #B03030; font-size: 0.82rem;
    background: #FDF5F5; border: 1px solid #E8C0C0; border-radius: 3px;
    padding: 0.55rem 0.85rem; width: 100%; display: none;
  }
  .error-msg.active { display: block; }

  /* ===== Keyframes ===== */
  @keyframes fadeIn   { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes bounceIn { from{opacity:0;transform:scale(0.25)} 55%{transform:scale(1.12)} 75%{transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  @keyframes wavePop  { 0%{transform:scale(1)} 40%{transform:scale(1.14) rotate(4deg);filter:brightness(1.2)} 100%{transform:scale(1) rotate(0);filter:none} }
  @keyframes countTick { from{transform:scale(1.45)} to{transform:scale(1)} }
  @keyframes starPop  { 0%{transform:scale(0) rotate(-30deg);opacity:0} 60%{transform:scale(1.4) rotate(8deg);opacity:1} 100%{transform:scale(1) rotate(0)} }
  @keyframes tada {
    0%  { transform:scale(1); }
    10% { transform:scale(0.95) rotate(-2deg); }
    25% { transform:scale(1.12) rotate(2deg); }
    40% { transform:scale(1.12) rotate(-2deg); }
    55% { transform:scale(1.12) rotate(2deg); }
    70% { transform:scale(1.06) rotate(-1deg); }
    100%{ transform:scale(1) rotate(0); }
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg) scaleX(1); opacity: 1; }
    50%  { transform: translateY(50vh) rotate(360deg) scaleX(-1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scaleX(1); opacity: 0; }
  }

  /* ===== High Score Display (Setup) ===== */
  .hs-display {
    display: flex; flex-direction: column; gap: 0.55rem; width: 100%;
    border-top: 1px solid var(--border);
    padding-top: 0.7rem;
  }
  .hs-heading {
    font-size: 0.6rem; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
  }
  .hs-items { display: flex; gap: 0; }
  .hs-item {
    display: flex; flex-direction: column; align-items: center; gap: 0.18rem;
    flex: 1;
  }
  .hs-item + .hs-item { border-left: 1px solid var(--border); }
  .hs-item-label { font-size: 0.56rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.09em; font-weight: 600; line-height: 1; }
  .hs-item-val { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--text-mid); font-weight: 700; line-height: 1; }

  /* ===== New Record Badge ===== */
  .new-record-badge {
    display: none;
    background: var(--accent); color: #fff;
    font-weight: 700; font-size: 0.72rem;
    padding: 0.32rem 0.9rem; border-radius: 2px;
    animation: bounceIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .new-record-badge.active { display: inline-block; }

  /* ===== Clear High Score Row ===== */
  .clear-hs-row { font-size: 0.76rem; color: var(--text-mid); display: flex; align-items: center; gap: 0.4rem; }
  .clear-hs-val { color: var(--text); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  /* ===== Confetti ===== */
  .confetti-piece {
    position: fixed; pointer-events: none; z-index: 300;
    width: 7px; height: 9px; border-radius: 1px;
    animation: confettiFall linear forwards;
  }

  /* ===== Lang Toggle ===== */
  #lang-toggle {
    position: fixed; top: 0.7rem; right: 0.7rem; z-index: 500;
    padding: 0.22rem 0.5rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 2px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 700;
    color: var(--text-mid); cursor: pointer; transition: all 0.12s; letter-spacing: 0.06em;
  }
  #lang-toggle:hover { border-color: var(--text); color: var(--text); }

  @media (max-width: 480px) {
    .screen { padding: 1rem; }
    #screen-game { gap: 0.45rem; }
    .game-header { gap: 0.35rem; padding-bottom: 0.45rem; }
    .stat-value { font-size: 0.9rem; }
    .btn-small { padding: 0.3rem 0.55rem; font-size: 0.72rem; }
    #overlay-clear { justify-content: flex-start; padding: 1.25rem 1rem; gap: 0.9rem; }
    .clear-title { font-size: clamp(2rem, 9vw, 2.8rem); }
    .score-breakdown { max-width: 100%; }
    .clear-buttons { flex-direction: column; width: 100%; max-width: 280px; }
    .clear-buttons .btn-primary { width: 100%; }
  }
</style>
</head>
<body>

<button id="lang-toggle">EN</button>

<!-- Setup Screen -->
<div id="screen-setup" class="screen active">
  <h1 class="title">PixJig</h1>

  <div class="examples" id="examples">
    <span class="example-chip" data-query="flower field"    data-preset="images/flower-field.png">🌸 花畑</span>
    <span class="example-chip" data-query="peacock"         data-preset="images/peacock.png">🦚 孔雀</span>
    <span class="example-chip" data-query="coral reef"      data-preset="images/coral-reef.png">🐠 珊瑚礁</span>
    <span class="example-chip" data-query="fireworks"       data-preset="images/fireworks.png">🎆 花火</span>
    <span class="example-chip" data-query="tropical parrot" data-preset="images/tropical-parrot.png">🦜 熱帯の鳥</span>
    <span class="example-chip" data-query="aurora borealis" data-preset="images/aurora.png">🌈 オーロラ</span>
    <span class="example-chip" data-query="autumn leaves"   data-preset="images/autumn-leaves.png">🍁 紅葉の森</span>
  </div>

  <textarea id="prompt-input" placeholder="キーワードを入力（例: red fox forest, Tokyo night）"></textarea>

  <div class="difficulty-group">
    <button class="diff-btn" data-size="3">3×3<br><small>9ピース</small></button>
    <button class="diff-btn selected" data-size="4">4×4<br><small>16ピース</small></button>
    <button class="diff-btn" data-size="5">5×5<br><small>25ピース</small></button>
  </div>
  <div id="setup-error" class="error-msg"></div>
  <button id="btn-start" class="btn-primary">スタート</button>
  <div class="hs-display" id="hs-display"></div>
</div>

<!-- Loading Screen -->
<div id="screen-loading" class="screen">
  <div class="spinner-wrap"><div class="spinner"></div></div>
  <p class="loading-text">画像を検索中...</p>
  <p class="loading-sub">Wikimedia Commons から関連写真を取得しています</p>
</div>

<!-- Game Screen -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="stat-box">
      <span class="stat-label">手数</span>
      <span class="stat-value" id="move-count">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">タイム</span>
      <span class="stat-value" id="timer-display">00:00</span>
    </div>
    <button class="btn-small" id="btn-shuffle">シャッフル</button>
    <button class="btn-small" id="btn-back">← 戻る</button>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>

  <p class="attribution">
    📷 <a id="attribution-link" href="https://commons.wikimedia.org/" target="_blank" rel="noopener noreferrer">Wikimedia Commons</a>
    (CC BY / CC BY-SA)
  </p>
</div>

<!-- Preview Countdown Overlay (shows on top of game screen) -->
<div id="overlay-preview">
  <img id="preview-full-img" src="" alt="preview">
  <div class="preview-count-badge">

<script>
// =====================================================
//  i18n
// =====================================================
const STRINGS = {

    pieces: n => `${n}ピース`,
    btnStart: 'スタート',

    loadingSub: 'Wikimedia Commons から関連写真を取得しています',

    previewMsg: '画像を覚えよう！',
    scoreLabel: 'スコア',
    btnRetry: '同じ画像でもう一度', btnNewGame: '新しいゲーム',

    bdParTime: par => `基準 ${par}秒　40%`,

    errSearch: '画像の検索に失敗しました',
    errNotFound: kw => `「${kw}」に関する画像が見つかりませんでした。別のキーワードを試してください。`,
    errInfo: '画像情報の取得に失敗しました',
    errUrl: '画像URLが取得できませんでした',
    errTimeout: '画像の読み込みがタイムアウトしました',
    errNetTimeout: '画像の取得がタイムアウトしました（15秒）',
    chips: ['🌸 花畑', '🦚 孔雀', '🐠 珊瑚礁', '🎆 花火', '🦜 熱帯の鳥', '🌈 オーロラ', '🍁 紅葉の森'],
  },
  en: {
    promptPlaceholder: 'Enter a keyword (e.g. red fox forest, Tokyo night)',
    pieces: n => `${n} pcs`,
    btnStart: 'Start',
    loadingText: 'Searching...',
    loadingSub: 'Fetching photos from Wikimedia Commons',
    statMoves: 'Moves', statTime: 'Time',
    btnShuffle: 'Shuffle', btnBack: '← Back',
    previewMsg: 'Memorize it!',
    scoreLabel: 'Score',
    btnRetry: 'Play again', btnNewGame: 'New game',
    bdMoves: 'Moves', bdTime: 'Time',
    bdParMoves: par => `par ${par}　60%`,
    bdParTime: par => `par ${par}s　40%`,
    bdMoveVal: n => `${n}`, bdTimeVal: s => `${s}s`,
    hsHeading: 'Best Score',
    hsScore: 'Score', hsMoves: 'Moves', hsTime: 'Time',
    hsMoveVal: n => `${n}`,
    clearHs: 'Best',
    errRequired: 'Please enter a keyword',
    errFail: 'Failed to load image. Please try again.',
    errSearch: 'Search failed',
    errNotFound: kw => `No images found for "${kw}". Try another keyword.`,
    errInfo: 'Failed to get image info',
    errUrl: 'Could not get image URL',
    errTimeout: 'Image load timed out',
    errNetTimeout: 'Request timed out (15s)',
    chips: ['🌸 Flower Field', '🦚 Peacock', '🐠 Coral Reef', '🎆 Fireworks', '🦜 Tropical Parrot', '🌈 Aurora', '🍁 Autumn Leaves'],
  },
};
let currentLang = localStorage.getItem('pixjig_lang') || 'ja';
const t = key => STRINGS[currentLang][key];

// =====================================================
//  State
// =====================================================
const State = {
  prompt: '',
  gridSize: 4,
  imageUrl: '',
  pieces: [],        // pieces[currentPos] = { correctIndex, groupId }
  moveCount: 0,
  startTime: null,
  elapsedMs: 0,
  timerInterval: null,
  scoreInterval: null,
  isSolved: false,
  // drag
  dragSrcPos: null,
  dragGroupPositions: [],   // all positions in the dragged group
  imageAspect: 1,           // width / height of source image
  presetImage: null,        // path to preset image (null = use Wikimedia search)
};

// =====================================================
//  High Score
// =====================================================
const HighScore = {
  _key: n => `pixjig_hs_${n}`,
  get(n) {
    try {
      const v = localStorage.getItem(this._key(n));
      if (!v) return null;
      const p = JSON.parse(v);
      // 旧フォーマット（数値のみ）は無視して null 扱い
      return (p && typeof p === 'object') ? p : null;
    } catch { return null; }
  },
  save(n, data) {
    try { localStorage.setItem(this._key(n), JSON.stringify(data)); } catch {}
  },
  check(n, score, moves, ms) {
    const best = this.get(n);
    if (!best || score > best.score) { this.save(n, { score, moves, ms }); return true; }
    return false;
  }
};

// =====================================================
//  Screen helpers
// =====================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// =====================================================
//  Timer
// =====================================================
const Timer = {
  start() {
    State.startTime = Date.now() - State.elapsedMs;
    clearInterval(State.timerInterval);
    State.timerInterval = setInterval(() => {
      State.elapsedMs = Date.now() - State.startTime;
      updateTimerDisplay();
    }, 500);
  },
  stop() {
    clearInterval(State.timerInterval);
    State.timerInterval = null;
    State.elapsedMs = Date.now() - State.startTime;
  },
  reset() {
    clearInterval(State.timerInterval);
    State.timerInterval = null;
    State.elapsedMs = 0;
    State.startTime = null;
    updateTimerDisplay();
  },
};

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
}
function updateTimerDisplay() {
  document.getElementById('timer-display').textContent = formatTime(State.elapsedMs);
}

// =====================================================
//  Image Search (Wikimedia Commons — CC licensed / Public Domain)
//  キーワードで Wikimedia Commons を検索し、関連写真を取得する。
//  APIキー不要・CORS対応済み。
// =====================================================
async function generateImage(prompt) {
  const keyword = prompt.trim() || 'nature landscape';
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);

  try {
    // Step 1: Commons でキーワード検索（File名前空間 = 6）
    const q = encodeURIComponent(keyword);
    const searchUrl =
      `https://commons.wikimedia.org/w/api.php?action=query&list=search` +
      `&srsearch=${q}&srnamespace=6&srlimit=20&format=json&origin=*`;

    const searchRes = await fetch(searchUrl, { signal: controller.signal });
    if (!searchRes.ok) throw new Error(t('errSearch'));
    const searchData = await searchRes.json();

    // JPEG / PNG / WebP に絞り込む
    const results = (searchData.query?.search || [])
      .filter(r => /\.(jpe?g|png|webp)$/i.test(r.title));

    if (results.length === 0) {
      throw new Error(STRINGS[currentLang].errNotFound(keyword));
    }

    // 上位10件からランダムに1枚選ぶ
    const picked = results[Math.floor(Math.random() * Math.min(results.length, 10))];

    // Step 2: 選んだファイルのサムネイル URL を取得
    const infoUrl =
      `https://commons.wikimedia.org/w/api.php?action=query` +
      `&titles=${encodeURIComponent(picked.title)}` +
      `&prop=imageinfo&iiprop=url&iiurlwidth=512&format=json&origin=*`;

    const infoRes = await fetch(infoUrl, { signal: controller.signal });
    if (!infoRes.ok) throw new Error(t('errInfo'));
    const infoData = await infoRes.json();

    const pages = infoData.query?.pages || {};
    const page  = Object.values(pages)[0];
    const imageUrl = page?.imageinfo?.[0]?.thumburl || page?.imageinfo?.[0]?.url;

    if (!imageUrl) throw new Error(t('errUrl'));

    clearTimeout(timeoutId);

    // Step 3: 実際に画像が読み込めるか確認
    return new Promise((resolve, reject) => {
      const img = new Image();
      const imgTimeout = setTimeout(() => {
        img.src = '';
        reject(new Error(t('errTimeout')));
      }, 10000);
      img.onload  = () => { clearTimeout(imgTimeout); resolve({ url: imageUrl, aspect: (img.naturalWidth / img.naturalHeight) || 1 }); };
      img.onerror = () => { clearTimeout(imgTimeout); reject(new Error(t('errFail'))); };
      img.src = imageUrl;
    });

  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error(t('errNetTimeout'));
    throw e;
  }
}

// =====================================================
//  Shuffle (Fisher-Yates)
// =====================================================
function shuffle(pieces) {
  const arr = [...pieces];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  const solved = arr.every((p, i) => p.correctIndex === i);
  if (solved && arr.length >= 2) [arr[0], arr[1]] = [arr[1], arr[0]];
  return arr;
}

// =====================================================
//  Group computation (Union-Find)
//  Two adjacent pieces belong to the same group when
//  their correctIndices have the same relative offset
//  as their current positions.
// =====================================================
function computeGroups() {
  const n = State.gridSize;
  const total = n * n;
  const parent = Array.from({ length: total }, (_, i) => i);

  function find(x) {
    if (parent[x] !== x) parent[x] = find(parent[x]);
    return parent[x];
  }
  function union(x, y) { parent[find(x)] = find(y); }

  for (let i = 0; i < total; i++) {
    const ci = State.pieces[i].correctIndex;
    // Right neighbor
    if ((i + 1) % n !== 0) {
      const cj = State.pieces[i + 1].correctIndex;
      if (cj === ci + 1 && Math.floor(ci / n) === Math.floor(cj / n)) {
        union(i, i + 1);
      }
    }
    // Bottom neighbor
    if (i + n < total) {
      const cj = State.pieces[i + n].correctIndex;
      if (cj === ci + n) union(i, i + n);
    }
  }

  for (let i = 0; i < total; i++) {
    State.pieces[i].groupId = find(i);
  }
}

// =====================================================
//  Render Board
// =====================================================
function renderBoard() {
  computeGroups();

  const board = document.getElementById('board');
  const n = State.gridSize;
  board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
  board.style.gridTemplateRows    = `repeat(${n}, 1fr)`;
  board.style.aspectRatio = String(State.imageAspect);

  const boardW = board.offsetWidth || 400;
  const boardH = boardW / State.imageAspect;
  const pieceW = boardW / n;
  const pieceH = boardH / n;

  const fragment = document.createDocumentFragment();
  State.pieces.forEach((piece, pos) => {
    const el = document.createElement('div');
    el.className = 'piece';
    el.dataset.pos = pos;
    applyPieceStyle(el, piece, boardW, boardH, pieceW, pieceH, n);
    applyPieceEdges(el, pos, n);
    fragment.appendChild(el);
  });

  board.innerHTML = '';
  board.appendChild(fragment);
}

function applyPieceStyle(el, piece, boardW, boardH, pieceW, pieceH, n) {
  const col = piece.correctIndex % n;
  const row = Math.floor(piece.correctIndex / n);
  el.style.backgroundImage    = `url(${State.imageUrl})`;
  el.style.backgroundSize     = `${boardW}px ${boardH}px`;
  el.style.backgroundPosition = `${-col * pieceW}px ${-row * pieceH}px`;
  el.style.backgroundRepeat   = 'no-repeat';
}

// Per-edge separation via inset box-shadow.
// Joined edges get no shadow (zero gap between pieces = perfect seam).
// Unjoined edges get a 1px inset shadow drawn on top of the image.
const SEP_SHADOW = 'rgba(0,0,0,0.35)';

function applyPieceEdges(el, pos, n) {
  const gid = State.pieces[pos].groupId;
  const row = Math.floor(pos / n);
  const col = pos % n;

  const topJoined    = row > 0    && State.pieces[pos - n]?.groupId === gid;
  const leftJoined   = col > 0    && State.pieces[pos - 1]?.groupId === gid;
  const rightJoined  = col < n-1  && State.pieces[pos + 1]?.groupId === gid;
  const bottomJoined = row < n-1  && State.pieces[pos + n]?.groupId === gid;

  const shadows = [];
  if (!topJoined)    shadows.push(`inset 0 2px 0 ${SEP_SHADOW}`);
  if (!leftJoined)   shadows.push(`inset 2px 0 0 ${SEP_SHADOW}`);
  if (!rightJoined)  shadows.push(`inset -2px 0 0 ${SEP_SHADOW}`);
  if (!bottomJoined) shadows.push(`inset 0 -2px 0 ${SEP_SHADOW}`);
  el.style.boxShadow = shadows.length ? shadows.join(', ') : 'none';
}

// =====================================================
//  Group swap (block swap)
//  Move the group anchored at srcPos so that the anchor
//  lands on dstPos. Displaced pieces fill the vacated spots.
// =====================================================
function swapGroup(srcPos, dstPos) {
  if (srcPos === dstPos || State.isSolved) return;

  const n = State.gridSize;
  const gid = State.pieces[srcPos].groupId;
  const groupPositions = State.pieces
    .map((p, i) => (p.groupId === gid ? i : -1))
    .filter(i => i >= 0);

  const offset = dstPos - srcPos;

  // Validate each new position
  const newPositions = [];
  for (const p of groupPositions) {
    const np = p + offset;
    if (np < 0 || np >= n * n) return;            // out of bounds
    // Row integrity: relative row within group must be preserved
    const srcRow = Math.floor(p / n);
    const anchorRow = Math.floor(srcPos / n);
    const dstRow = Math.floor(dstPos / n);
    const expectedRow = dstRow + (srcRow - anchorRow);
    if (Math.floor(np / n) !== expectedRow) return; // row-wrap
    newPositions.push(np);
  }

  // Build new pieces array
  const srcSet = new Set(groupPositions);
  const dstSet = new Set(newPositions);

  // Positions vacated by the group that aren't occupied by the group's new positions
  const srcOnly = groupPositions.filter(p => !dstSet.has(p));
  // Positions that the group will move into, currently occupied by non-group pieces
  const dstOnly = newPositions.filter(p => !srcSet.has(p));

  if (srcOnly.length !== dstOnly.length) return; // sanity check

  const newPieces = [...State.pieces];

  // Move group to new positions
  for (let i = 0; i < groupPositions.length; i++) {
    newPieces[newPositions[i]] = State.pieces[groupPositions[i]];
  }
  // Displaced pieces go to vacated spots
  for (let i = 0; i < dstOnly.length; i++) {
    newPieces[srcOnly[i]] = State.pieces[dstOnly[i]];
  }

  State.pieces = newPieces;
  State.moveCount++;
  document.getElementById('move-count').textContent = State.moveCount;
  renderBoard();
  checkSolved();
}

// =====================================================
//  Score & Stars
//  efficiency = (parMoves/moves)*0.6 + (parSecs/secs)*0.4
//  score = base * min(efficiency, 3)   ← par超えで青天井(最大3倍)
//  ⭐⭐⭐: eff ≥ 1.0  ⭐⭐: eff ≥ 0.45  ⭐: クリアのみ
// =====================================================
// 難易度別定数（上限なし・自然にゲームの物理限界が上限になる）
const DIFFICULTY = {
  3: { base:  5000, parMoves:  20, parSecs:  60 },
  4: { base: 15000, parMoves:  50, parSecs: 150 },
  5: { base: 40000, parMoves: 100, parSecs: 300 },
};

function calcScore(moves, ms, n) {
  const { base, parMoves, parSecs } = DIFFICULTY[n];
  const secs      = Math.max(1, ms / 1000);
  const mvs       = Math.max(1, moves);
  const moveRatio = parMoves / mvs;
  const timeRatio = parSecs  / secs;
  const eff       = moveRatio * 0.6 + timeRatio * 0.4;
  const score     = Math.max(
    Math.round(base * eff),
    Math.round(base * 0.05)   // 最低 base の 5%
  );
  const stars = eff >= 1.0 ? 3 : eff >= 0.45 ? 2 : 1;
  return { score, stars, eff, moveRatio, timeRatio, base, parMoves, parSecs };
}

// =====================================================
//  Check / Handle Solved
// =====================================================
function checkSolved() {
  if (State.pieces.every((p, i) => p.correctIndex === i)) {
    State.isSolved = true;
    handleSolved();
  }
}

function handleSolved() {
  Timer.stop();
  const pieces = document.querySelectorAll('.piece');
  pieces.forEach((el, i) => {
    el.style.setProperty('--piece-index', i);
    el.classList.add('wave-anim');
  });
  setTimeout(showClearOverlay, 1800); // wave(~900ms) + 完成図を~0.9秒鑑賞
}

function showClearOverlay() {
  const { score, stars, eff, moveRatio, timeRatio, base, parMoves, parSecs } =
    calcScore(State.moveCount, State.elapsedMs, State.gridSize);
  const secs = Math.max(1, State.elapsedMs / 1000);

  document.getElementById('overlay-img-bg').style.backgroundImage = `url(${State.imageUrl})`;
  document.getElementById('clear-thumb').src = State.imageUrl;
  document.getElementById('clear-moves').textContent = State.moveCount;
  document.getElementById('clear-time').textContent  = formatTime(State.elapsedMs);

  // --- Stars ---
  const starsEl = document.getElementById('clear-stars');
  starsEl.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    const span = document.createElement('span');
    span.className = 'clear-star';
    span.textContent = i <= stars ? '★' : '☆';
    span.style.color = i <= stars ? '#fbbf24' : '#2a2a50';
    starsEl.appendChild(span);
  }

  // --- Score count-up ---
  const scoreEl = document.getElementById('clear-score-value');
  scoreEl.textContent = '0';
  let current = 0;
  const steps = 28, interval = 700 / steps;
  clearInterval(State.scoreInterval);
  State.scoreInterval = setInterval(() => {
    current = Math.min(current + score / steps, score);
    scoreEl.textContent = Math.round(current).toLocaleString('ja-JP');
    if (current >= score) { clearInterval(State.scoreInterval); State.scoreInterval = null; }
  }, interval);

  // --- Breakdown ---
  function multColor(r) {
    return r >= 1.5 ? '#34d399' : r >= 1.0 ? '#86efac' : r >= 0.5 ? '#fbbf24' : '#fb923c';
  }
  const S = STRINGS[currentLang];
  document.getElementById('score-breakdown').innerHTML = `
    <div class="bd-row">
      <span class="bd-label">${S.bdMoves}</span>
      <span class="bd-val">${S.bdMoveVal(State.moveCount)}</span>
      <span class="bd-arr">→</span>
      <span class="bd-mult" style="color:${multColor(moveRatio)}">×${moveRatio.toFixed(2)}</span>
      <span class="bd-par">${S.bdParMoves(parMoves)}</span>
    </div>
    <div class="bd-row">
      <span class="bd-label">${S.bdTime}</span>
      <span class="bd-val">${S.bdTimeVal(Math.round(secs))}</span>
      <span class="bd-arr">→</span>
      <span class="bd-mult" style="color:${multColor(timeRatio)}">×${timeRatio.toFixed(2)}</span>
      <span class="bd-par">${S.bdParTime(parSecs)}</span>
    </div>
    <div class="bd-formula">
      ${base.toLocaleString('ja-JP')} × <strong style="color:${multColor(eff)}">${eff.toFixed(2)}</strong>
      &nbsp;＝&nbsp;<strong>${score.toLocaleString('ja-JP')}</strong>
    </div>`;

  // --- High Score ---
  const badgeEl = document.getElementById('new-record-badge');
  const hsRowEl = document.getElementById('clear-hs-row');
  const clearTitleEl = document.querySelector('#overlay-clear .clear-title');
  const isNewRecord = HighScore.check(State.gridSize, score, State.moveCount, State.elapsedMs);
  badgeEl.classList.toggle('active', isNewRecord);
  if (isNewRecord) {
    clearTitleEl.textContent = '🏆 NEW RECORD!';
    showConfetti();
  } else {
    clearTitleEl.textContent = '🎉 CLEAR!';
  }
  const best = HighScore.get(State.gridSize);
  hsRowEl.innerHTML = best
    ? `${S.clearHs} <span class="clear-hs-val">${best.score.toLocaleString('ja-JP')}</span><span style="color:#4a4a70">／</span>${S.hsMoveVal(best.moves)}<span style="color:#4a4a70">／</span>${formatTime(best.ms)}`
    : '';

  document.getElementById('overlay-clear').classList.add('active');
}

// =====================================================
//  Preview Countdown (3 → 2 → 1 → GO)
//  Shows the board in solved state so the user memorises
//  the image before pieces are scrambled.
// =====================================================
function showPreviewThenStart(imageUrl, gridSize) {
  const n = gridSize;
  const total = n * n;

  // Set up solved state for preview
  State.imageUrl  = imageUrl;
  State.gridSize  = n;
  State.pieces    = Array.from({ length: total }, (_, i) => ({ correctIndex: i, groupId: i }));
  State.isSolved  = false;
  State.moveCount = 0;
  document.getElementById('move-count').textContent = '0';
  document.getElementById('preview-full-img').src = imageUrl;
  Timer.reset();

  // Attribution: extract filename from Wikimedia thumb URL
  // format: .../commons/thumb/X/XX/File_Name.jpg/512px-File_Name.jpg
  const fileMatch = imageUrl.match(/commons\/thumb\/[^/]+\/[^/]+\/([^/]+\.(?:jpe?g|png|webp))\//i);
  const attrLink  = document.getElementById('attribution-link');
  if (fileMatch) {
    const fileName   = decodeURIComponent(fileMatch[1]);
    const displayName = fileName.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
    attrLink.href        = `https://commons.wikimedia.org/wiki/File:${fileMatch[1]}`;
    attrLink.textContent = displayName;
  } else {
    attrLink.href        = 'https://commons.wikimedia.org/';
    attrLink.textContent = 'Wikimedia Commons';
  }

  showScreen('screen-game');

  // Wait for DOM, then render solved board
  requestAnimationFrame(() => requestAnimationFrame(() => {
    renderBoard();

    // Show the countdown overlay
    const overlay   = document.getElementById('overlay-preview');
    const circleEl  = document.getElementById('countdown-circle');
    overlay.classList.add('active');

    let count = 3;
    circleEl.textContent = count;

    const tick = setInterval(() => {
      count--;
      circleEl.classList.remove('tick');
      void circleEl.offsetWidth; // reflow to restart animation
      circleEl.classList.add('tick');

      if (count <= 0) {
        clearInterval(tick);
        overlay.classList.remove('active');

        // Scramble and start the actual game
        State.pieces = shuffle(
          Array.from({ length: total }, (_, i) => ({ correctIndex: i }))
        );
        State.isSolved = false;
        renderBoard();
        initBoardEvents();
        initResizeObserver();
        Timer.start();
      } else {
        circleEl.textContent = count;
      }
    }, 1000);
  }));
}

// =====================================================
//  Drag/Touch Helpers
// =====================================================
function getGroupPositions(gid) {
  return State.pieces
    .map((p, i) => (p.groupId === gid ? i : -1))
    .filter(i => i >= 0);
}

function validateGroupPlacement(groupPositions, srcPos, dstPos) {
  const n = State.gridSize;
  const offset = dstPos - srcPos;
  const anchorRow = Math.floor(srcPos / n);
  const dstRow = Math.floor(dstPos / n);
  const targetPositions = [];
  for (const p of groupPositions) {
    const np = p + offset;
    if (np < 0 || np >= n * n) return null;
    if (Math.floor(np / n) !== dstRow + (Math.floor(p / n) - anchorRow)) return null;
    targetPositions.push(np);
  }
  return targetPositions;
}

function buildGroupGhost(groupPositions, boardRect, extraStyles) {
  const n = State.gridSize;
  const pieceW = boardRect.width / n;
  const pieceH = boardRect.height / n;
  const rows = groupPositions.map(p => Math.floor(p / n));
  const cols = groupPositions.map(p => p % n);
  const minRow = Math.min(...rows), maxRow = Math.max(...rows);
  const minCol = Math.min(...cols), maxCol = Math.max(...cols);
  const ghostW = (maxCol - minCol + 1) * pieceW;
  const ghostH = (maxRow - minRow + 1) * pieceH;
  const ghost = document.createElement('div');
  ghost.style.cssText = `position:fixed;pointer-events:none;overflow:hidden;border-radius:4px;width:${ghostW}px;height:${ghostH}px;${extraStyles}`;
  groupPositions.forEach(p => {
    const pr = Math.floor(p / n) - minRow;
    const pc = (p % n) - minCol;
    const ci = State.pieces[p].correctIndex;
    const seg = document.createElement('div');
    seg.style.cssText = `position:absolute;left:${pc * pieceW}px;top:${pr * pieceH}px;width:${pieceW}px;height:${pieceH}px;`;
    seg.style.backgroundImage    = `url(${State.imageUrl})`;
    seg.style.backgroundSize     = `${boardRect.width}px ${boardRect.height}px`;
    seg.style.backgroundPosition = `${-(ci % n) * pieceW}px ${-Math.floor(ci / n) * pieceH}px`;
    seg.style.backgroundRepeat   = 'no-repeat';
    ghost.appendChild(seg);
  });
  return { ghost, ghostW, ghostH, minRow, minCol, pieceW, pieceH };
}

function clearDragClasses() {
  document.getElementById('board').querySelectorAll('.dragging, .drag-over')
    .forEach(el => el.classList.remove('dragging', 'drag-over'));
}

// =====================================================
//  Board Events (D&D + Touch)
// =====================================================
let _boardEventsInitialized = false;
function initBoardEvents() {
  if (_boardEventsInitialized) return;
  _boardEventsInitialized = true;

  const board = document.getElementById('board');

  // ---- Desktop HTML5 D&D ----

  board.addEventListener('mousedown', e => {
    const piece = e.target.closest('.piece');
    if (piece) piece.setAttribute('draggable', 'true');
  });

  board.addEventListener('dragstart', e => {
    const piece = e.target.closest('.piece');
    if (!piece) return;
    const srcPos = parseInt(piece.dataset.pos);
    State.dragSrcPos = srcPos;
    State.dragGroupPositions = getGroupPositions(State.pieces[srcPos].groupId);

    const boardRect = board.getBoundingClientRect();
    const { ghost, minRow, minCol, pieceW, pieceH } =
      buildGroupGhost(State.dragGroupPositions, boardRect, 'left:-9999px;top:-9999px;');
    document.body.appendChild(ghost);

    const n = State.gridSize;
    const srcCol = (srcPos % n) - minCol;
    const srcRow = Math.floor(srcPos / n) - minRow;
    const pieceRect = piece.getBoundingClientRect();
    e.dataTransfer.setDragImage(ghost,
      srcCol * pieceW + (e.clientX - pieceRect.left),
      srcRow * pieceH + (e.clientY - pieceRect.top));
    setTimeout(() => ghost.remove(), 0);

    const dragSet = new Set(State.dragGroupPositions);
    board.querySelectorAll('.piece').forEach(el => {
      if (dragSet.has(parseInt(el.dataset.pos))) el.classList.add('dragging');
    });

    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', srcPos);
  });

  board.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    board.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const piece = e.target.closest('.piece');
    if (!piece || State.dragSrcPos === null) return;
    const dstPos = parseInt(piece.dataset.pos);
    const targetPositions = validateGroupPlacement(State.dragGroupPositions, State.dragSrcPos, dstPos);
    if (!targetPositions) return;
    const targetSet = new Set(targetPositions);
    board.querySelectorAll('.piece').forEach(el => {
      if (targetSet.has(parseInt(el.dataset.pos))) el.classList.add('drag-over');
    });
  });

  board.addEventListener('dragleave', e => {
    const piece = e.target.closest('.piece');
    if (piece) piece.classList.remove('drag-over');
  });

  board.addEventListener('drop', e => {
    e.preventDefault();
    const piece = e.target.closest('.piece');
    if (!piece || State.dragSrcPos === null) return;
    const dstPos = parseInt(piece.dataset.pos);
    swapGroup(State.dragSrcPos, dstPos);
    State.dragSrcPos = null;
    State.dragGroupPositions = [];
    clearDragClasses();
  });

  board.addEventListener('dragend', () => {
    clearDragClasses();
    State.dragSrcPos = null;
    State.dragGroupPositions = [];
  });

  // ---- Mobile Touch Events ----
  let touchGhost = null;
  let touchSrcPos = null;
  let touchGroupPositions = [];
  let touchHoverPos = null;

  board.addEventListener('touchstart', e => {
    const piece = e.target.closest('.piece');
    if (!piece) return;
    e.preventDefault();

    touchSrcPos = parseInt(piece.dataset.pos);
    touchGroupPositions = getGroupPositions(State.pieces[touchSrcPos].groupId);

    const boardRect = board.getBoundingClientRect();
    const { ghost, ghostW, ghostH } =
      buildGroupGhost(touchGroupPositions, boardRect, 'z-index:999;opacity:0.75;transform:scale(1.08);');
    document.body.appendChild(ghost);
    touchGhost = ghost;

    const touch = e.touches[0];
    ghost.style.left = (touch.clientX - ghostW / 2) + 'px';
    ghost.style.top  = (touch.clientY - ghostH / 2) + 'px';

    const dragSet = new Set(touchGroupPositions);
    board.querySelectorAll('.piece').forEach(el => {
      if (dragSet.has(parseInt(el.dataset.pos))) el.classList.add('dragging');
    });
  }, { passive: false });

  board.addEventListener('touchmove', e => {
    if (touchSrcPos === null) return;
    e.preventDefault();
    const touch = e.touches[0];

    if (touchGhost) {
      touchGhost.style.left = (touch.clientX - touchGhost.offsetWidth / 2) + 'px';
      touchGhost.style.top  = (touch.clientY - touchGhost.offsetHeight / 2) + 'px';
    }

    if (touchGhost) touchGhost.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (touchGhost) touchGhost.style.display = '';

    board.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const hoverPiece = el && el.closest('.piece');
    if (!hoverPiece) { touchHoverPos = null; return; }

    const dstPos = parseInt(hoverPiece.dataset.pos);
    const targetPositions = validateGroupPlacement(touchGroupPositions, touchSrcPos, dstPos);
    if (targetPositions) {
      touchHoverPos = dstPos;
      const targetSet = new Set(targetPositions);
      board.querySelectorAll('.piece').forEach(el => {
        if (targetSet.has(parseInt(el.dataset.pos))) el.classList.add('drag-over');
      });
    } else {
      touchHoverPos = null;
    }
  }, { passive: false });

  board.addEventListener('touchend', e => {
    e.preventDefault();
    if (touchGhost) { touchGhost.remove(); touchGhost = null; }
    clearDragClasses();
    if (touchSrcPos !== null && touchHoverPos !== null) {
      swapGroup(touchSrcPos, touchHoverPos);
    }
    touchSrcPos = null; touchGroupPositions = []; touchHoverPos = null;
  }, { passive: false });
}

// =====================================================
//  ResizeObserver
// =====================================================
let resizeTimer = null;
function initResizeObserver() {
  const board = document.getElementById('board');
  if (board._ro) board._ro.disconnect();
  const ro = new ResizeObserver(() => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderBoard, 60);
  });
  ro.observe(board);
  board._ro = ro;
}

// =====================================================
//  Setup Screen
// =====================================================
document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('prompt-input').value = chip.dataset.query;
    State.presetImage = chip.dataset.preset || null;
  });
});

document.getElementById('prompt-input').addEventListener('input', () => {
  State.presetImage = null;
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    State.gridSize = parseInt(btn.dataset.size);
    updateHsDisplay();
  });
});

document.getElementById('btn-start').addEventListener('click', async () => {
  const prompt = document.getElementById('prompt-input').value.trim();
  const errorEl = document.getElementById('setup-error');
  errorEl.classList.remove('active');

  if (!prompt) {
    errorEl.textContent = t('errRequired');
    errorEl.classList.add('active');
    return;
  }

  State.prompt = prompt;
  document.getElementById('btn-start').disabled = true;

  if (State.presetImage) {
    State.imageAspect = 1;
    showPreviewThenStart(State.presetImage, State.gridSize);
    document.getElementById('btn-start').disabled = false;
  } else {
    showScreen('screen-loading');
    try {
      const { url, aspect } = await generateImage(prompt);
      State.imageAspect = aspect;
      showPreviewThenStart(url, State.gridSize);
    } catch (err) {
      showScreen('screen-setup');
      errorEl.textContent = err.message || t('errFail');
      errorEl.classList.add('active');
    } finally {
      document.getElementById('btn-start').disabled = false;
    }
  }
});

// =====================================================
//  Game Screen Buttons
// =====================================================
document.getElementById('btn-shuffle').addEventListener('click', () => {
  if (State.isSolved) return;
  State.pieces = shuffle(State.pieces.map(p => ({ correctIndex: p.correctIndex })));
  State.moveCount = 0;
  document.getElementById('move-count').textContent = '0';
  Timer.reset();
  renderBoard();
  Timer.start();
});

document.getElementById('btn-back').addEventListener('click', () => {
  Timer.stop();
  document.getElementById('overlay-clear').classList.remove('active');
  document.getElementById('overlay-preview').classList.remove('active');
  showScreen('screen-setup');
  updateHsDisplay();
});

document.getElementById('btn-retry-same').addEventListener('click', () => {
  document.getElementById('overlay-clear').classList.remove('active');
  showPreviewThenStart(State.imageUrl, State.gridSize);
});

document.getElementById('btn-new-game').addEventListener('click', () => {
  Timer.stop();
  document.getElementById('overlay-clear').classList.remove('active');
  showScreen('screen-setup');
  updateHsDisplay();
});

// Lightbox
document.getElementById('clear-thumb').addEventListener('click', () => {
  document.getElementById('lightbox-img').src = State.imageUrl;
  document.getElementById('overlay-lightbox').classList.add('active');
});
document.getElementById('overlay-lightbox').addEventListener('click', () => {
  document.getElementById('overlay-lightbox').classList.remove('active');
});

document.getElementById('board').addEventListener('contextmenu', e => e.preventDefault());

// =====================================================
//  Confetti
// =====================================================
function showConfetti() {
  const colors = ['#C8401A','#D4720A','#2A6640','#1A4A80','#8A3A70','#3A5E8A'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    el.style.width = (6 + Math.random() * 6) + 'px';
    el.style.height = (8 + Math.random() * 8) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }
}

// =====================================================
//  HS Display (Setup Screen)
// =====================================================
function updateHsDisplay() {
  const el = document.getElementById('hs-display');
  if (!el) return;
  const best = HighScore.get(State.gridSize);
  if (!best) { el.innerHTML = ''; return; }
  const Sh = STRINGS[currentLang];
  el.innerHTML = `
    <div class="hs-heading">${Sh.hsHeading}</div>
    <div class="hs-items">
      <div class="hs-item"><span class="hs-item-label">${Sh.hsScore}</span><span class="hs-item-val">${best.score.toLocaleString('ja-JP')}</span></div>
      <div class="hs-item"><span class="hs-item-label">${Sh.hsMoves}</span><span class="hs-item-val">${best.moves}</span></div>
      <div class="hs-item"><span class="hs-item-label">${Sh.hsTime}</span><span class="hs-item-val">${formatTime(best.ms)}</span></div>
    </div>
  `;
}
// =====================================================
//  Language
// =====================================================
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('pixjig_lang', lang);
  const S = STRINGS[lang];

  document.getElementById('prompt-input').placeholder = S.promptPlaceholder;
  document.querySelectorAll('.diff-btn').forEach(btn => {
    const size = parseInt(btn.dataset.size);
    btn.innerHTML = `${size}×${size}<br><small>${S.pieces(size * size)}</small>`;
  });
  document.getElementById('btn-start').textContent = S.btnStart;
  document.querySelector('.loading-text').textContent = S.loadingText;
  document.querySelector('.loading-sub').textContent = S.loadingSub;
  const statLabels = document.querySelectorAll('.stat-label');
  statLabels[0].textContent = S.statMoves;
  statLabels[1].textContent = S.statTime;
  document.getElementById('btn-shuffle').textContent = S.btnShuffle;
  document.getElementById('btn-back').textContent = S.btnBack;
  document.querySelector('.preview-count-msg').textContent = S.previewMsg;
  document.querySelector('.clear-score-label').textContent = S.scoreLabel;
  const clearStatLabels = document.querySelectorAll('.clear-stat-label');
  clearStatLabels[0].textContent = S.statMoves;
  clearStatLabels[1].textContent = S.statTime;
  document.getElementById('btn-retry-same').textContent = S.btnRetry;
  document.getElementById('btn-new-game').textContent = S.btnNewGame;
  document.querySelectorAll('.example-chip').forEach((chip, i) => {
    if (S.chips[i]) chip.textContent = S.chips[i];
  });
  document.getElementById('lang-toggle').textContent = lang === 'ja' ? 'EN' : 'JP';

  updateHsDisplay();
}

document.getElementById('lang-toggle').addEventListener('click', () => {
  applyLang(currentLang === 'ja' ? 'en' : 'ja');
});

applyLang(currentLang);
document.getElementById('prompt-input').value = 'flower field';
State.presetImage = 'images/flower-field.png';
</script>
