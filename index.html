<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixJig</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f0f1a;
    color: #e0e0f0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .screen { display: none; width: 100%; max-width: 640px; padding: 1.5rem; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }

  /* ===== Setup ===== */
  #screen-setup { animation: fadeIn 0.4s ease; }

  .title {
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 800;
    text-align: center;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }
  label {font-size: 0.8rem; font-weight: 600; color: #a0a0c0; text-transform: uppercase;
          letter-spacing: 0.08em; align-self: flex-start; width: 100%; }

  textarea {
    width: 100%; height: 54px;
    background: #1a1a2e; border: 1.5px solid #333360; border-radius: 10px;
    color: #e0e0f0; font-size: 0.9rem; padding: 0.6rem 0.9rem;
    resize: none; outline: none; transition: border-color 0.2s; font-family: inherit;
  }
  textarea:focus { border-color: #7c3aed; }

  .difficulty-group { display: flex; gap: 0.6rem; width: 100%; }
  .diff-btn {
    flex: 1; padding: 0.6rem 0;
    background: #1a1a2e; border: 1.5px solid #333360; border-radius: 8px;
    color: #a0a0c0; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btn:hover { border-color: #7c3aed; color: #e0e0f0; }
  .diff-btn.selected { background: #3b1fa3; border-color: #7c3aed; color: #fff; }

  .btn-primary {
    width: 100%; padding: 0.85rem;
    background: linear-gradient(135deg, #7c3aed, #2563eb); border: none;
    border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.02em;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .examples { width: 100%; display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .example-chip {
    padding: 0.3rem 0.7rem;
    background: #1a1a2e; border: 1px solid #333360; border-radius: 20px;
    font-size: 0.75rem; color: #8888aa; cursor: pointer; transition: all 0.15s;
  }
  .example-chip:hover { border-color: #7c3aed; color: #c0c0e0; }

  /* ===== Loading ===== */
  #screen-loading { gap: 2rem; animation: fadeIn 0.3s ease; }
  .spinner-wrap { position: relative; width: 80px; height: 80px; }
  .spinner {
    width: 80px; height: 80px;
    border: 4px solid #1a1a2e; border-top-color: #7c3aed;
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  .loading-text { font-size: 1rem; color: #a0a0c0; text-align: center; }
  .loading-sub  { font-size: 0.8rem; color: #666688; text-align: center; }

  /* ===== Game ===== */
  #screen-game { max-width: 720px; gap: 0.75rem; animation: fadeIn 0.4s ease; }

  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; gap: 0.5rem;
  }
  .stat-box {
    display: flex; flex-direction: column; align-items: center;
    background: #1a1a2e; border: 1px solid #333360; border-radius: 8px;
    padding: 0.4rem 0.9rem; min-width: 70px;
  }
  .stat-label { font-size: 0.65rem; color: #666688; text-transform: uppercase; letter-spacing: 0.07em; }
  .stat-value { font-size: 1.05rem; font-weight: 700; color: #c0c0f0; font-variant-numeric: tabular-nums; }

  .btn-small {
    padding: 0.45rem 0.9rem;
    background: #1a1a2e; border: 1px solid #333360; border-radius: 8px;
    color: #a0a0c0; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-small:hover { border-color: #7c3aed; color: #e0e0f0; }

  .board-wrap { position: relative; width: 100%; }

  #board {
    display: grid;
    width: 100%;
    gap: 0;               /* gap: 0 — borders handle separation */
    border-radius: 8px;
    overflow: hidden;
    background: #0f0f1a;
    touch-action: none;
    user-select: none;
  }

  /* ===== Piece ===== */
  .piece {
    position: relative;
    cursor: grab;
    border-radius: 0;
    /* border colors set per-edge via JS */
    border: 1.5px solid rgba(255,255,255,0.12);
    background-origin: border-box; /* image covers full piece incl. border area */
    transition: transform 0.12s, opacity 0.12s;
    background-color: #1a1a2e;
  }
  .piece:active { cursor: grabbing; }

  /* Dragging state */
  .piece.dragging   { opacity: 0.4; transform: scale(1.06); z-index: 10; }
  .piece.drag-over  { outline: 2px solid #7c3aed; outline-offset: -2px; transform: scale(0.96); }

  /* Group visual: a subtle warm glow on outer edges of a group piece */
  .piece.grouped {
    box-shadow: 0 0 0 0 transparent; /* placeholder — edges controlled via border-color */
  }

  /* Clear wave animation */
  .piece.wave-anim {
    animation: wavePop 0.6s ease forwards;
    animation-delay: calc(var(--piece-index) * 0.06s);
  }

  /* Preview strip */
  .preview-wrap { display: flex; align-items: center; gap: 0.75rem; width: 100%; }
  .preview-label { font-size: 0.7rem; color: #666688; text-transform: uppercase;
                   letter-spacing: 0.07em; white-space: nowrap; }
  #preview-img {
    height: 72px; width: 72px; object-fit: cover;
    border-radius: 6px; border: 1.5px solid #333360; flex-shrink: 0;
  }
  .preview-prompt { font-size: 0.78rem; color: #8888aa; line-height: 1.4;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

  /* Attribution */
  .attribution {
    font-size: 0.7rem; color: #555578; text-align: right; width: 100%;
  }
  .attribution a { color: #6666a0; text-decoration: none; }
  .attribution a:hover { color: #9999c8; text-decoration: underline; }

  /* ===== Preview Countdown Overlay ===== */
  #overlay-preview {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,20,0.6);
    backdrop-filter: blur(2px);
    z-index: 60;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    pointer-events: none; /* let board show below */
  }
  #overlay-preview.active { display: flex; }

  .preview-count-badge {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  }
  .preview-count-msg {
    font-size: 1.1rem; font-weight: 700; color: #e0e0f0;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    letter-spacing: 0.04em;
  }
  .countdown-circle {
    width: 80px; height: 80px;
    border: 4px solid #7c3aed;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(15,15,26,0.85);
    box-shadow: 0 0 24px rgba(124,58,237,0.5);
    font-size: 2.4rem; font-weight: 900; color: #e0e0f0;
    transition: transform 0.2s;
  }
  .countdown-circle.tick { animation: countTick 0.35s cubic-bezier(0.34,1.56,0.64,1); }

  /* ===== Clear Overlay ===== */
  #overlay-clear {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,20,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.5rem;
    backdrop-filter: blur(6px);
  }
  #overlay-clear.active { display: flex; }

  .clear-title {
    font-size: clamp(2.5rem, 10vw, 4.5rem); font-weight: 900;
    background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1); text-align: center;
  }

  /* Stars */
  .clear-stars-row { display: flex; gap: 0.2rem; justify-content: center; }
  .clear-star {
    display: inline-block;
    font-size: 2.8rem; line-height: 1;
    animation: starPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .clear-star:nth-child(1) { animation-delay: 0.1s; }
  .clear-star:nth-child(2) { animation-delay: 0.28s; }
  .clear-star:nth-child(3) { animation-delay: 0.46s; }

  /* Score */
  .clear-score-row { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
  .clear-score-label { font-size: 0.68rem; color: #8888aa; text-transform: uppercase; letter-spacing: 0.1em; }
  .clear-score-value {
    font-size: clamp(2rem, 8vw, 3rem); font-weight: 900; color: #e0e0f0;
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  }

  .clear-stats { display: flex; gap: 1.5rem; text-align: center; }
  .clear-stat  { display: flex; flex-direction: column; gap: 0.25rem; }
  .clear-stat-label { font-size: 0.75rem; color: #8888aa; text-transform: uppercase; letter-spacing: 0.08em; }
  .clear-stat-value { font-size: 1.8rem; font-weight: 800; color: #e0e0f0; }
  .clear-buttons { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
  .btn-retry { background: linear-gradient(135deg, #7c3aed, #2563eb); }

  /* Score breakdown */
  .score-breakdown {
    background: rgba(20,20,38,0.9);
    border: 1px solid #2e2e58;
    border-radius: 10px;
    padding: 0.65rem 1rem;
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; gap: 0.35rem;
    font-size: 0.82rem;
  }
  .bd-row { display: flex; align-items: center; gap: 0.45rem; }
  .bd-label { color: #8888aa; min-width: 3em; }
  .bd-val   { font-weight: 700; color: #c0c0f0; min-width: 3.2em; text-align: right; }
  .bd-arr   { color: #4a4a70; }
  .bd-mult  { font-weight: 800; font-size: 0.92rem; min-width: 3.8em; }
  .bd-par   { color: #555580; font-size: 0.75rem; margin-left: auto; }
  .bd-formula {
    border-top: 1px solid #2e2e58; margin-top: 0.1rem; padding-top: 0.35rem;
    text-align: right; color: #8888aa; font-size: 0.8rem; line-height: 1.5;
  }
  .bd-formula strong { color: #c0c0f0; font-size: 0.9rem; }

  .error-msg {
    color: #f87171; font-size: 0.85rem;
    background: #2a1010; border: 1px solid #7f1d1d; border-radius: 8px;
    padding: 0.6rem 1rem; width: 100%; display: none;
  }
  .error-msg.active { display: block; }

  /* ===== Keyframes ===== */
  @keyframes fadeIn   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes bounceIn { from{opacity:0;transform:scale(0.3)} 60%{transform:scale(1.1)} to{opacity:1;transform:scale(1)} }
  @keyframes wavePop  { 0%{transform:scale(1)} 40%{transform:scale(1.12) rotate(3deg);filter:brightness(1.3)} 100%{transform:scale(1);filter:brightness(1)} }
  @keyframes countTick { from{transform:scale(1.4)} to{transform:scale(1)} }
  @keyframes starPop  { 0%{transform:scale(0) rotate(-30deg);opacity:0} 60%{transform:scale(1.35) rotate(8deg);opacity:1} 100%{transform:scale(1) rotate(0)} }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg) scaleX(1); opacity: 1; }
    50%  { transform: translateY(50vh) rotate(360deg) scaleX(-1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scaleX(1); opacity: 0; }
  }

  /* ===== High Score Display (Setup) ===== */
  .hs-display {
    display: flex; gap: 0.6rem; justify-content: center; width: 100%; min-height: 2.6rem;
  }
  .hs-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.12rem;
    background: #1a1a2e; border: 1px solid #2e2e58; border-radius: 8px; padding: 0.35rem 0.4rem;
  }
  .hs-item-label { font-size: 0.58rem; color: #666688; text-transform: uppercase; letter-spacing: 0.07em; }
  .hs-item-val { font-size: 0.88rem; color: #c0c0f0; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* ===== New Record Badge ===== */
  .new-record-badge {
    display: none;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #0f0f1a;
    font-weight: 900; font-size: 1.1rem;
    padding: 0.4rem 1.4rem; border-radius: 20px;
    animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    letter-spacing: 0.06em;
  }
  .new-record-badge.active { display: inline-block; }

  /* ===== Clear High Score Row ===== */
  .clear-hs-row {
    font-size: 0.82rem; color: #8888aa;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .clear-hs-val { color: #c0c0f0; font-weight: 700; }

  /* ===== Confetti ===== */
  .confetti-piece {
    position: fixed; pointer-events: none; z-index: 300;
    width: 8px; height: 10px; border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @media (max-width: 480px) {
    .screen { padding: 1rem; }
    #screen-game { gap: 0.5rem; }
    .game-header { gap: 0.4rem; }
    .stat-box { padding: 0.3rem 0.55rem; min-width: 58px; }
    .stat-label { font-size: 0.58rem; }
    .stat-value { font-size: 0.95rem; }
    .btn-small { padding: 0.35rem 0.65rem; font-size: 0.75rem; }
    #overlay-clear {
      justify-content: flex-start;
      overflow-y: auto;
      padding: 1.5rem 1rem;
      gap: 1rem;
    }
    .clear-title { font-size: clamp(2rem, 9vw, 3rem); }
    .clear-star { font-size: 2.2rem; }
    .score-breakdown { max-width: 100%; }
    .clear-buttons { flex-direction: column; width: 100%; max-width: 300px; }
    .clear-buttons .btn-primary { width: 100%; }
  }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="screen-setup" class="screen active">
  <h1 class="title">PixJig</h1>

  <div class="examples" id="examples">
    <span class="example-chip">🌸 桜と富士山</span>
    <span class="example-chip">🌊 海と灯台</span>
    <span class="example-chip">🏙️ 夜の都市</span>
    <span class="example-chip">🦊 森の狐</span>
    <span class="example-chip">🌌 銀河と星空</span>
    <span class="example-chip">🐉 ドラゴン</span>
  </div>

  <textarea id="prompt-input" placeholder="キーワードを入力（例: red fox forest, Tokyo night）"></textarea>

  <div class="difficulty-group">
    <button class="diff-btn" data-size="3">3×3<br><small>9ピース</small></button>
    <button class="diff-btn selected" data-size="4">4×4<br><small>16ピース</small></button>
    <button class="diff-btn" data-size="5">5×5<br><small>25ピース</small></button>
  </div>
  <div class="hs-display" id="hs-display"></div>

  <div id="setup-error" class="error-msg"></div>
  <button id="btn-start" class="btn-primary">スタート</button>
</div>

<!-- Loading Screen -->
<div id="screen-loading" class="screen">
  <div class="spinner-wrap"><div class="spinner"></div></div>
  <p class="loading-text">画像を検索中...</p>
  <p class="loading-sub">Wikimedia Commons から関連写真を取得しています</p>
</div>

<!-- Game Screen -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="stat-box">
      <span class="stat-label">手数</span>
      <span class="stat-value" id="move-count">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">タイム</span>
      <span class="stat-value" id="timer-display">00:00</span>
    </div>
    <button class="btn-small" id="btn-shuffle">シャッフル</button>
    <button class="btn-small" id="btn-back">← 戻る</button>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>

  <div class="preview-wrap">
    <span class="preview-label">答え</span>
    <img id="preview-img" src="" alt="preview">
    <p class="preview-prompt" id="preview-prompt"></p>
  </div>
  <p class="attribution">
    📷 <a id="attribution-link" href="https://commons.wikimedia.org/" target="_blank" rel="noopener noreferrer">Wikimedia Commons</a>
    (CC BY / CC BY-SA)
  </p>
</div>

<!-- Preview Countdown Overlay (shows on top of game screen) -->
<div id="overlay-preview">
  <div class="preview-count-badge">
    <p class="preview-count-msg">画像を覚えよう！</p>
    <div class="countdown-circle" id="countdown-circle">3</div>
  </div>
</div>

<!-- Clear Overlay -->
<div id="overlay-clear">
  <div class="clear-title">🎉 CLEAR!</div>
  <div class="clear-stars-row" id="clear-stars"></div>
  <div class="clear-score-row">
    <span class="clear-score-label">スコア</span>
    <span class="clear-score-value" id="clear-score-value">0</span>
  </div>
  <div class="new-record-badge" id="new-record-badge">🏆 NEW RECORD!</div>
  <div class="clear-hs-row" id="clear-hs-row"></div>
  <div class="score-breakdown" id="score-breakdown"></div>
  <div class="clear-stats">
    <div class="clear-stat">
      <span class="clear-stat-label">手数</span>
      <span class="clear-stat-value" id="clear-moves">0</span>
    </div>
    <div class="clear-stat">
      <span class="clear-stat-label">タイム</span>
      <span class="clear-stat-value" id="clear-time">00:00</span>
    </div>
  </div>
  <div class="clear-buttons">
    <button class="btn-primary btn-retry" id="btn-retry-same">同じ画像でもう一度</button>
    <button class="btn-primary" id="btn-new-game">新しいゲーム</button>
  </div>
</div>

<script>
// =====================================================
//  State
// =====================================================
const State = {
  prompt: '',
  gridSize: 4,
  imageUrl: '',
  pieces: [],        // pieces[currentPos] = { correctIndex, groupId }
  moveCount: 0,
  startTime: null,
  elapsedMs: 0,
  timerInterval: null,
  isSolved: false,
  // drag
  dragSrcPos: null,
  dragGroupPositions: [],   // all positions in the dragged group
  imageAspect: 1,           // width / height of source image
};

// =====================================================
//  High Score
// =====================================================
const HighScore = {
  _key: n => `pixjig_hs_${n}`,
  get(n) {
    try {
      const v = localStorage.getItem(this._key(n));
      if (!v) return null;
      const p = JSON.parse(v);
      // 旧フォーマット（数値のみ）は無視して null 扱い
      return (p && typeof p === 'object') ? p : null;
    } catch { return null; }
  },
  save(n, data) {
    try { localStorage.setItem(this._key(n), JSON.stringify(data)); } catch {}
  },
  check(n, score, moves, ms) {
    const best = this.get(n);
    if (!best || score > best.score) { this.save(n, { score, moves, ms }); return true; }
    return false;
  }
};

// =====================================================
//  Screen helpers
// =====================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// =====================================================
//  Timer
// =====================================================
const Timer = {
  start() {
    State.startTime = Date.now() - State.elapsedMs;
    clearInterval(State.timerInterval);
    State.timerInterval = setInterval(() => {
      State.elapsedMs = Date.now() - State.startTime;
      updateTimerDisplay();
    }, 500);
  },
  stop() {
    clearInterval(State.timerInterval);
    State.timerInterval = null;
    State.elapsedMs = Date.now() - State.startTime;
  },
  reset() {
    clearInterval(State.timerInterval);
    State.timerInterval = null;
    State.elapsedMs = 0;
    State.startTime = null;
    updateTimerDisplay();
  },
};

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
}
function updateTimerDisplay() {
  document.getElementById('timer-display').textContent = formatTime(State.elapsedMs);
}

// =====================================================
//  Image Search (Wikimedia Commons — CC licensed / Public Domain)
//  キーワードで Wikimedia Commons を検索し、関連写真を取得する。
//  APIキー不要・CORS対応済み。
// =====================================================
async function generateImage(prompt) {
  const keyword = prompt.trim() || 'nature landscape';
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);

  try {
    // Step 1: Commons でキーワード検索（File名前空間 = 6）
    const q = encodeURIComponent(keyword);
    const searchUrl =
      `https://commons.wikimedia.org/w/api.php?action=query&list=search` +
      `&srsearch=${q}&srnamespace=6&srlimit=20&format=json&origin=*`;

    const searchRes = await fetch(searchUrl, { signal: controller.signal });
    if (!searchRes.ok) throw new Error('画像の検索に失敗しました');
    const searchData = await searchRes.json();

    // JPEG / PNG / WebP に絞り込む
    const results = (searchData.query?.search || [])
      .filter(r => /\.(jpe?g|png|webp)$/i.test(r.title));

    if (results.length === 0) {
      throw new Error(`「${keyword}」に関する画像が見つかりませんでした。別のキーワードを試してください。`);
    }

    // 上位10件からランダムに1枚選ぶ
    const picked = results[Math.floor(Math.random() * Math.min(results.length, 10))];

    // Step 2: 選んだファイルのサムネイル URL を取得
    const infoUrl =
      `https://commons.wikimedia.org/w/api.php?action=query` +
      `&titles=${encodeURIComponent(picked.title)}` +
      `&prop=imageinfo&iiprop=url&iiurlwidth=512&format=json&origin=*`;

    const infoRes = await fetch(infoUrl, { signal: controller.signal });
    if (!infoRes.ok) throw new Error('画像情報の取得に失敗しました');
    const infoData = await infoRes.json();

    const pages = infoData.query?.pages || {};
    const page  = Object.values(pages)[0];
    const imageUrl = page?.imageinfo?.[0]?.thumburl || page?.imageinfo?.[0]?.url;

    if (!imageUrl) throw new Error('画像URLが取得できませんでした');

    clearTimeout(timeoutId);

    // Step 3: 実際に画像が読み込めるか確認
    return new Promise((resolve, reject) => {
      const img = new Image();
      const imgTimeout = setTimeout(() => {
        img.src = '';
        reject(new Error('画像の読み込みがタイムアウトしました'));
      }, 10000);
      img.onload  = () => { clearTimeout(imgTimeout); resolve({ url: imageUrl, aspect: (img.naturalWidth / img.naturalHeight) || 1 }); };
      img.onerror = () => { clearTimeout(imgTimeout); reject(new Error('画像の読み込みに失敗しました。もう一度試してください。')); };
      img.src = imageUrl;
    });

  } catch (e) {
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') throw new Error('画像の取得がタイムアウトしました（15秒）');
    throw e;
  }
}

// =====================================================
//  Shuffle (Fisher-Yates)
// =====================================================
function shuffle(pieces) {
  const arr = [...pieces];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  const solved = arr.every((p, i) => p.correctIndex === i);
  if (solved && arr.length >= 2) [arr[0], arr[1]] = [arr[1], arr[0]];
  return arr;
}

// =====================================================
//  Group computation (Union-Find)
//  Two adjacent pieces belong to the same group when
//  their correctIndices have the same relative offset
//  as their current positions.
// =====================================================
function computeGroups() {
  const n = State.gridSize;
  const total = n * n;
  const parent = Array.from({ length: total }, (_, i) => i);

  function find(x) {
    if (parent[x] !== x) parent[x] = find(parent[x]);
    return parent[x];
  }
  function union(x, y) { parent[find(x)] = find(y); }

  for (let i = 0; i < total; i++) {
    const ci = State.pieces[i].correctIndex;
    // Right neighbor
    if ((i + 1) % n !== 0) {
      const cj = State.pieces[i + 1].correctIndex;
      if (cj === ci + 1 && Math.floor(ci / n) === Math.floor(cj / n)) {
        union(i, i + 1);
      }
    }
    // Bottom neighbor
    if (i + n < total) {
      const cj = State.pieces[i + n].correctIndex;
      if (cj === ci + n) union(i, i + n);
    }
  }

  for (let i = 0; i < total; i++) {
    State.pieces[i].groupId = find(i);
  }
}

// =====================================================
//  Render Board
// =====================================================
function renderBoard() {
  computeGroups();

  const board = document.getElementById('board');
  const n = State.gridSize;
  board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
  board.style.gridTemplateRows    = `repeat(${n}, 1fr)`;
  board.style.aspectRatio = String(State.imageAspect);

  const boardW = board.offsetWidth || 400;
  const boardH = boardW / State.imageAspect;
  const pieceW = boardW / n;
  const pieceH = boardH / n;

  const fragment = document.createDocumentFragment();
  State.pieces.forEach((piece, pos) => {
    const el = document.createElement('div');
    el.className = 'piece';
    el.dataset.pos = pos;
    applyPieceStyle(el, piece, boardW, boardH, pieceW, pieceH, n);
    applyPieceEdges(el, pos, n);
    fragment.appendChild(el);
  });

  board.innerHTML = '';
  board.appendChild(fragment);
}

function applyPieceStyle(el, piece, boardW, boardH, pieceW, pieceH, n) {
  const col = piece.correctIndex % n;
  const row = Math.floor(piece.correctIndex / n);
  el.style.backgroundImage    = `url(${State.imageUrl})`;
  el.style.backgroundSize     = `${boardW}px ${boardH}px`;
  el.style.backgroundPosition = `${-col * pieceW}px ${-row * pieceH}px`;
  el.style.backgroundRepeat   = 'no-repeat';
  el.style.backgroundOrigin   = 'border-box';
}

// Per-edge border: transparent on joined edges (background shows through),
// visible on unjoined edges (creates separation).
const SEP   = 'rgba(255,255,255,0.13)';
const JOINED = 'transparent';

function applyPieceEdges(el, pos, n) {
  const gid = State.pieces[pos].groupId;
  const row = Math.floor(pos / n);
  const col = pos % n;

  const topJoined    = row > 0    && State.pieces[pos - n]?.groupId === gid;
  const leftJoined   = col > 0    && State.pieces[pos - 1]?.groupId === gid;
  const rightJoined  = col < n-1  && State.pieces[pos + 1]?.groupId === gid;
  const bottomJoined = row < n-1  && State.pieces[pos + n]?.groupId === gid;

  el.style.borderTopColor    = topJoined    ? JOINED : SEP;
  el.style.borderLeftColor   = leftJoined   ? JOINED : SEP;
  el.style.borderRightColor  = rightJoined  ? JOINED : SEP;
  el.style.borderBottomColor = bottomJoined ? JOINED : SEP;
}

// =====================================================
//  Group swap (block swap)
//  Move the group anchored at srcPos so that the anchor
//  lands on dstPos. Displaced pieces fill the vacated spots.
// =====================================================
function swapGroup(srcPos, dstPos) {
  if (srcPos === dstPos || State.isSolved) return;

  const n = State.gridSize;
  const gid = State.pieces[srcPos].groupId;
  const groupPositions = State.pieces
    .map((p, i) => (p.groupId === gid ? i : -1))
    .filter(i => i >= 0);

  const offset = dstPos - srcPos;

  // Validate each new position
  const newPositions = [];
  for (const p of groupPositions) {
    const np = p + offset;
    if (np < 0 || np >= n * n) return;            // out of bounds
    // Row integrity: relative row within group must be preserved
    const srcRow = Math.floor(p / n);
    const anchorRow = Math.floor(srcPos / n);
    const dstRow = Math.floor(dstPos / n);
    const expectedRow = dstRow + (srcRow - anchorRow);
    if (Math.floor(np / n) !== expectedRow) return; // row-wrap
    newPositions.push(np);
  }

  // Build new pieces array
  const srcSet = new Set(groupPositions);
  const dstSet = new Set(newPositions);

  // Positions vacated by the group that aren't occupied by the group's new positions
  const srcOnly = groupPositions.filter(p => !dstSet.has(p));
  // Positions that the group will move into, currently occupied by non-group pieces
  const dstOnly = newPositions.filter(p => !srcSet.has(p));

  if (srcOnly.length !== dstOnly.length) return; // sanity check

  const newPieces = [...State.pieces];

  // Move group to new positions
  for (let i = 0; i < groupPositions.length; i++) {
    newPieces[newPositions[i]] = State.pieces[groupPositions[i]];
  }
  // Displaced pieces go to vacated spots
  for (let i = 0; i < dstOnly.length; i++) {
    newPieces[srcOnly[i]] = State.pieces[dstOnly[i]];
  }

  State.pieces = newPieces;
  State.moveCount++;
  document.getElementById('move-count').textContent = State.moveCount;
  renderBoard();
  checkSolved();
}

// For backwards compat and single-piece swaps:
function swapPieces(a, b) { swapGroup(a, b); }

// =====================================================
//  Score & Stars
//  efficiency = (parMoves/moves)*0.6 + (parSecs/secs)*0.4
//  score = base * min(efficiency, 3)   ← par超えで青天井(最大3倍)
//  ⭐⭐⭐: eff ≥ 1.0  ⭐⭐: eff ≥ 0.45  ⭐: クリアのみ
// =====================================================
// 難易度別定数（上限なし・自然にゲームの物理限界が上限になる）
const DIFFICULTY = {
  3: { base:  5000, parMoves:  20, parSecs:  60 },
  4: { base: 15000, parMoves:  50, parSecs: 150 },
  5: { base: 40000, parMoves: 100, parSecs: 300 },
};

function calcScore(moves, ms, n) {
  const { base, parMoves, parSecs } = DIFFICULTY[n];
  const secs      = Math.max(1, ms / 1000);
  const mvs       = Math.max(1, moves);
  const moveRatio = parMoves / mvs;
  const timeRatio = parSecs  / secs;
  const eff       = moveRatio * 0.6 + timeRatio * 0.4;
  const score     = Math.max(
    Math.round(base * eff),
    Math.round(base * 0.05)   // 最低 base の 5%
  );
  const stars = eff >= 1.0 ? 3 : eff >= 0.45 ? 2 : 1;
  return { score, stars, eff, moveRatio, timeRatio, base, parMoves, parSecs };
}

// =====================================================
//  Check / Handle Solved
// =====================================================
function checkSolved() {
  if (State.pieces.every((p, i) => p.correctIndex === i)) {
    State.isSolved = true;
    handleSolved();
  }
}

function handleSolved() {
  Timer.stop();
  const pieces = document.querySelectorAll('.piece');
  pieces.forEach((el, i) => {
    el.style.setProperty('--piece-index', i);
    el.classList.add('wave-anim');
  });
  setTimeout(showClearOverlay, 1800); // wave(~900ms) + 完成図を~0.9秒鑑賞
}

function showClearOverlay() {
  const { score, stars, eff, moveRatio, timeRatio, base, parMoves, parSecs } =
    calcScore(State.moveCount, State.elapsedMs, State.gridSize);
  const secs = Math.max(1, State.elapsedMs / 1000);

  document.getElementById('clear-moves').textContent = State.moveCount;
  document.getElementById('clear-time').textContent  = formatTime(State.elapsedMs);

  // --- Stars ---
  const starsEl = document.getElementById('clear-stars');
  starsEl.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    const span = document.createElement('span');
    span.className = 'clear-star';
    span.textContent = i <= stars ? '★' : '☆';
    span.style.color = i <= stars ? '#fbbf24' : '#2a2a50';
    starsEl.appendChild(span);
  }

  // --- Score count-up ---
  const scoreEl = document.getElementById('clear-score-value');
  scoreEl.textContent = '0';
  let current = 0;
  const steps = 28, interval = 700 / steps;
  const timer = setInterval(() => {
    current = Math.min(current + score / steps, score);
    scoreEl.textContent = Math.round(current).toLocaleString('ja-JP');
    if (current >= score) clearInterval(timer);
  }, interval);

  // --- Breakdown ---
  function multColor(r) {
    return r >= 1.5 ? '#34d399' : r >= 1.0 ? '#86efac' : r >= 0.5 ? '#fbbf24' : '#fb923c';
  }
  document.getElementById('score-breakdown').innerHTML = `
    <div class="bd-row">
      <span class="bd-label">手数</span>
      <span class="bd-val">${State.moveCount}手</span>
      <span class="bd-arr">→</span>
      <span class="bd-mult" style="color:${multColor(moveRatio)}">×${moveRatio.toFixed(2)}</span>
      <span class="bd-par">基準 ${parMoves}手　60%</span>
    </div>
    <div class="bd-row">
      <span class="bd-label">タイム</span>
      <span class="bd-val">${Math.round(secs)}秒</span>
      <span class="bd-arr">→</span>
      <span class="bd-mult" style="color:${multColor(timeRatio)}">×${timeRatio.toFixed(2)}</span>
      <span class="bd-par">基準 ${parSecs}秒　40%</span>
    </div>
    <div class="bd-formula">
      ${base.toLocaleString('ja-JP')} × <strong style="color:${multColor(eff)}">${eff.toFixed(2)}</strong>
      &nbsp;＝&nbsp;<strong>${score.toLocaleString('ja-JP')}</strong>
    </div>`;

  // --- High Score ---
  const badgeEl = document.getElementById('new-record-badge');
  const hsRowEl = document.getElementById('clear-hs-row');
  const clearTitleEl = document.querySelector('#overlay-clear .clear-title');
  const isNewRecord = HighScore.check(State.gridSize, score, State.moveCount, State.elapsedMs);
  badgeEl.classList.toggle('active', isNewRecord);
  if (isNewRecord) {
    clearTitleEl.textContent = '🏆 NEW RECORD!';
    showConfetti();
  } else {
    clearTitleEl.textContent = '🎉 CLEAR!';
  }
  const best = HighScore.get(State.gridSize);
  hsRowEl.innerHTML = best
    ? `自己ベスト <span class="clear-hs-val">${best.score.toLocaleString('ja-JP')}</span><span style="color:#4a4a70">／</span>${best.moves}手<span style="color:#4a4a70">／</span>${formatTime(best.ms)}`
    : '';

  document.getElementById('overlay-clear').classList.add('active');
}

// =====================================================
//  Preview Countdown (3 → 2 → 1 → GO)
//  Shows the board in solved state so the user memorises
//  the image before pieces are scrambled.
// =====================================================
function showPreviewThenStart(imageUrl, gridSize) {
  const n = gridSize;
  const total = n * n;

  // Set up solved state for preview
  State.imageUrl  = imageUrl;
  State.gridSize  = n;
  State.pieces    = Array.from({ length: total }, (_, i) => ({ correctIndex: i, groupId: i }));
  State.isSolved  = false;
  State.moveCount = 0;
  document.getElementById('move-count').textContent = '0';
  document.getElementById('preview-img').src = imageUrl;
  document.getElementById('preview-prompt').textContent = State.prompt;
  Timer.reset();

  // Attribution: extract filename from Wikimedia thumb URL
  // format: .../commons/thumb/X/XX/File_Name.jpg/512px-File_Name.jpg
  const fileMatch = imageUrl.match(/commons\/thumb\/[^/]+\/[^/]+\/([^/]+\.(?:jpe?g|png|webp))\//i);
  const attrLink  = document.getElementById('attribution-link');
  if (fileMatch) {
    const fileName   = decodeURIComponent(fileMatch[1]);
    const displayName = fileName.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
    attrLink.href        = `https://commons.wikimedia.org/wiki/File:${fileMatch[1]}`;
    attrLink.textContent = displayName;
  } else {
    attrLink.href        = 'https://commons.wikimedia.org/';
    attrLink.textContent = 'Wikimedia Commons';
  }

  showScreen('screen-game');

  // Wait for DOM, then render solved board
  requestAnimationFrame(() => requestAnimationFrame(() => {
    renderBoard();

    // Show the countdown overlay
    const overlay   = document.getElementById('overlay-preview');
    const circleEl  = document.getElementById('countdown-circle');
    overlay.classList.add('active');

    let count = 3;
    circleEl.textContent = count;

    const tick = setInterval(() => {
      count--;
      circleEl.classList.remove('tick');
      void circleEl.offsetWidth; // reflow to restart animation
      circleEl.classList.add('tick');

      if (count <= 0) {
        clearInterval(tick);
        overlay.classList.remove('active');

        // Scramble and start the actual game
        State.pieces = shuffle(
          Array.from({ length: total }, (_, i) => ({ correctIndex: i }))
        );
        State.isSolved = false;
        renderBoard();
        initBoardEvents();
        initResizeObserver();
        Timer.start();
      } else {
        circleEl.textContent = count;
      }
    }, 1000);
  }));
}

// =====================================================
//  Board Events (D&D + Touch)
// =====================================================
let _boardEventsInitialized = false;
function initBoardEvents() {
  if (_boardEventsInitialized) return;
  _boardEventsInitialized = true;

  const board = document.getElementById('board');

  // ---- Desktop HTML5 D&D ----

  board.addEventListener('mousedown', e => {
    const piece = e.target.closest('.piece');
    if (piece) piece.setAttribute('draggable', 'true');
  });

  board.addEventListener('dragstart', e => {
    const piece = e.target.closest('.piece');
    if (!piece) return;
    const srcPos = parseInt(piece.dataset.pos);
    State.dragSrcPos = srcPos;

    // Determine group
    const gid = State.pieces[srcPos].groupId;
    State.dragGroupPositions = State.pieces
      .map((p, i) => (p.groupId === gid ? i : -1))
      .filter(i => i >= 0);

    // --- Build composite ghost image for the whole group ---
    const n = State.gridSize;
    const boardRect = board.getBoundingClientRect();
    const pieceW = boardRect.width  / n;
    const pieceH = boardRect.height / n;

    const groupRows = State.dragGroupPositions.map(p => Math.floor(p / n));
    const groupCols = State.dragGroupPositions.map(p => p % n);
    const minRow = Math.min(...groupRows), maxRow = Math.max(...groupRows);
    const minCol = Math.min(...groupCols), maxCol = Math.max(...groupCols);
    const ghostW = (maxCol - minCol + 1) * pieceW;
    const ghostH = (maxRow - minRow + 1) * pieceH;

    const ghost = document.createElement('div');
    ghost.style.cssText = `position:fixed;left:-9999px;top:-9999px;
      width:${ghostW}px;height:${ghostH}px;
      pointer-events:none;overflow:hidden;border-radius:4px;`;

    State.dragGroupPositions.forEach(p => {
      const pr = Math.floor(p / n) - minRow;
      const pc = (p % n) - minCol;
      const ci = State.pieces[p].correctIndex;
      const seg = document.createElement('div');
      seg.style.cssText = `position:absolute;
        left:${pc * pieceW}px;top:${pr * pieceH}px;
        width:${pieceW}px;height:${pieceH}px;`;
      seg.style.backgroundImage    = `url(${State.imageUrl})`;
      seg.style.backgroundSize     = `${boardRect.width}px ${boardRect.height}px`;
      seg.style.backgroundPosition = `${-(ci % n) * pieceW}px ${-Math.floor(ci / n) * pieceH}px`;
      seg.style.backgroundRepeat   = 'no-repeat';
      seg.style.backgroundOrigin   = 'border-box';
      ghost.appendChild(seg);
    });

    document.body.appendChild(ghost);

    // Cursor offset within ghost: where the grabbed piece sits inside the group
    const srcCol = (srcPos % n) - minCol;
    const srcRow = Math.floor(srcPos / n) - minRow;
    const pieceRect = piece.getBoundingClientRect();
    const ox = srcCol * pieceW + (e.clientX - pieceRect.left);
    const oy = srcRow * pieceH + (e.clientY - pieceRect.top);
    e.dataTransfer.setDragImage(ghost, ox, oy);

    // Browser captures the drag image synchronously; remove after one tick
    setTimeout(() => ghost.remove(), 0);

    // Mark group pieces as dragging
    board.querySelectorAll('.piece').forEach(el => {
      if (State.dragGroupPositions.includes(parseInt(el.dataset.pos)))
        el.classList.add('dragging');
    });

    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', srcPos);
  });

  board.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    board.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const piece = e.target.closest('.piece');
    if (!piece) return;
    const dstPos = parseInt(piece.dataset.pos);
    if (State.dragSrcPos === null) return;

    // Validate group placement and highlight target cells
    const offset = dstPos - State.dragSrcPos;
    const n = State.gridSize;
    let valid = true;
    const targetPositions = [];
    for (const p of State.dragGroupPositions) {
      const np = p + offset;
      if (np < 0 || np >= n * n) { valid = false; break; }
      const srcRow = Math.floor(p / n), anchorRow = Math.floor(State.dragSrcPos / n);
      const dstRow = Math.floor(dstPos / n);
      if (Math.floor(np / n) !== dstRow + (srcRow - anchorRow)) { valid = false; break; }
      targetPositions.push(np);
    }
    if (!valid) return;

    board.querySelectorAll('.piece').forEach(el => {
      if (targetPositions.includes(parseInt(el.dataset.pos))) {
        el.classList.add('drag-over');
      }
    });
  });

  board.addEventListener('dragleave', e => {
    const piece = e.target.closest('.piece');
    if (piece) piece.classList.remove('drag-over');
  });

  board.addEventListener('drop', e => {
    e.preventDefault();
    const piece = e.target.closest('.piece');
    if (!piece || State.dragSrcPos === null) return;
    const dstPos = parseInt(piece.dataset.pos);
    swapGroup(State.dragSrcPos, dstPos);
    State.dragSrcPos = null;
    State.dragGroupPositions = [];
    board.querySelectorAll('.dragging, .drag-over').forEach(el => el.classList.remove('dragging', 'drag-over'));
  });

  board.addEventListener('dragend', () => {
    board.querySelectorAll('.dragging, .drag-over').forEach(el => el.classList.remove('dragging', 'drag-over'));
    State.dragSrcPos = null;
    State.dragGroupPositions = [];
  });

  // ---- Mobile Touch Events ----
  let touchGhost = null;
  let touchSrcPos = null;
  let touchGroupPositions = [];
  let touchHoverPos = null;

  board.addEventListener('touchstart', e => {
    const piece = e.target.closest('.piece');
    if (!piece) return;
    e.preventDefault();

    touchSrcPos = parseInt(piece.dataset.pos);
    const gid = State.pieces[touchSrcPos].groupId;
    touchGroupPositions = State.pieces
      .map((p, i) => (p.groupId === gid ? i : -1))
      .filter(i => i >= 0);

    // Build composite ghost of all group pieces
    const n = State.gridSize;
    const board = document.getElementById('board');
    const boardRect = board.getBoundingClientRect();
    const pieceW = boardRect.width  / n;
    const pieceH = boardRect.height / n;

    // Group bounding box in grid coords
    const groupRows = touchGroupPositions.map(p => Math.floor(p / n));
    const groupCols = touchGroupPositions.map(p => p % n);
    const minRow = Math.min(...groupRows), maxRow = Math.max(...groupRows);
    const minCol = Math.min(...groupCols), maxCol = Math.max(...groupCols);
    const ghostW = (maxCol - minCol + 1) * pieceW;
    const ghostH = (maxRow - minRow + 1) * pieceH;

    const ghost = document.createElement('div');
    ghost.style.cssText = `
      position:fixed; pointer-events:none; z-index:999;
      width:${ghostW}px; height:${ghostH}px;
      opacity:0.75; transform:scale(1.08);
      border-radius:4px; overflow:hidden;
    `;

    touchGroupPositions.forEach(p => {
      const pr = Math.floor(p / n) - minRow;
      const pc = (p % n) - minCol;
      const seg = document.createElement('div');
      seg.style.cssText = `
        position:absolute;
        left:${pc * pieceW}px; top:${pr * pieceH}px;
        width:${pieceW}px; height:${pieceH}px;
      `;
      const ci = State.pieces[p].correctIndex;
      seg.style.backgroundImage    = `url(${State.imageUrl})`;
      seg.style.backgroundSize     = `${boardRect.width}px ${boardRect.height}px`;
      seg.style.backgroundPosition = `${-(ci % n) * pieceW}px ${-Math.floor(ci / n) * pieceH}px`;
      seg.style.backgroundRepeat   = 'no-repeat';
      seg.style.backgroundOrigin   = 'border-box';
      ghost.appendChild(seg);
    });

    document.body.appendChild(ghost);
    touchGhost = ghost;

    // Center ghost on finger
    const touch = e.touches[0];
    ghost.style.left = (touch.clientX - ghostW / 2) + 'px';
    ghost.style.top  = (touch.clientY - ghostH / 2) + 'px';

    board.querySelectorAll('.piece').forEach(el => {
      if (touchGroupPositions.includes(parseInt(el.dataset.pos)))
        el.classList.add('dragging');
    });
  }, { passive: false });

  board.addEventListener('touchmove', e => {
    if (touchSrcPos === null) return;
    e.preventDefault();
    const touch = e.touches[0];
    const n = State.gridSize;

    if (touchGhost) {
      touchGhost.style.left = (touch.clientX - touchGhost.offsetWidth / 2) + 'px';
      touchGhost.style.top  = (touch.clientY - touchGhost.offsetHeight / 2) + 'px';
    }

    // Detect hover cell
    if (touchGhost) touchGhost.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (touchGhost) touchGhost.style.display = '';

    board.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const hoverPiece = el && el.closest('.piece');
    if (!hoverPiece) { touchHoverPos = null; return; }

    const dstPos = parseInt(hoverPiece.dataset.pos);
    const offset = dstPos - touchSrcPos;
    let valid = true;
    const targetPositions = [];

    for (const p of touchGroupPositions) {
      const np = p + offset;
      if (np < 0 || np >= n * n) { valid = false; break; }
      const srcRow = Math.floor(p / n), anchorRow = Math.floor(touchSrcPos / n);
      const dstRow = Math.floor(dstPos / n);
      if (Math.floor(np / n) !== dstRow + (srcRow - anchorRow)) { valid = false; break; }
      targetPositions.push(np);
    }

    if (valid) {
      touchHoverPos = dstPos;
      board.querySelectorAll('.piece').forEach(el => {
        if (targetPositions.includes(parseInt(el.dataset.pos)))
          el.classList.add('drag-over');
      });
    } else {
      touchHoverPos = null;
    }
  }, { passive: false });

  board.addEventListener('touchend', e => {
    e.preventDefault();
    if (touchGhost) { touchGhost.remove(); touchGhost = null; }
    board.querySelectorAll('.dragging, .drag-over').forEach(el =>
      el.classList.remove('dragging', 'drag-over'));

    if (touchSrcPos !== null && touchHoverPos !== null) {
      swapGroup(touchSrcPos, touchHoverPos);
    }
    touchSrcPos = null; touchGroupPositions = []; touchHoverPos = null;
  }, { passive: false });
}

// =====================================================
//  ResizeObserver
// =====================================================
let resizeTimer = null;
function initResizeObserver() {
  const board = document.getElementById('board');
  if (board._ro) board._ro.disconnect();
  const ro = new ResizeObserver(() => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderBoard, 60);
  });
  ro.observe(board);
  board._ro = ro;
}

// =====================================================
//  Setup Screen
// =====================================================
const examplePrompts = {
  '🌸 桜と富士山': 'Mount Fuji cherry blossom',
  '🌊 海と灯台':   'lighthouse sea coast',
  '🏙️ 夜の都市':   'Tokyo night city',
  '🦊 森の狐':     'red fox forest',
  '🌌 銀河と星空': 'milky way night sky',
  '🐉 ドラゴン':   'dragon statue',
};

document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const key = chip.textContent.trim();
    document.getElementById('prompt-input').value = examplePrompts[key] || key;
  });
});

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    State.gridSize = parseInt(btn.dataset.size);
    updateHsDisplay();
  });
});

document.getElementById('btn-start').addEventListener('click', async () => {
  const prompt = document.getElementById('prompt-input').value.trim();
  const errorEl = document.getElementById('setup-error');
  errorEl.classList.remove('active');

  if (!prompt) {
    errorEl.textContent = 'プロンプトを入力してください';
    errorEl.classList.add('active');
    return;
  }

  State.prompt = prompt;
  document.getElementById('btn-start').disabled = true;
  showScreen('screen-loading');

  try {
    const { url, aspect } = await generateImage(prompt);
    State.imageAspect = aspect;
    showPreviewThenStart(url, State.gridSize);
  } catch (err) {
    showScreen('screen-setup');
    errorEl.textContent = err.message || '画像生成に失敗しました。もう一度試してください。';
    errorEl.classList.add('active');
  } finally {
    document.getElementById('btn-start').disabled = false;
  }
});

// =====================================================
//  Game Screen Buttons
// =====================================================
document.getElementById('btn-shuffle').addEventListener('click', () => {
  if (State.isSolved) return;
  State.pieces = shuffle(State.pieces.map(p => ({ correctIndex: p.correctIndex })));
  State.moveCount = 0;
  document.getElementById('move-count').textContent = '0';
  Timer.reset();
  renderBoard();
  Timer.start();
});

document.getElementById('btn-back').addEventListener('click', () => {
  Timer.stop();
  document.getElementById('overlay-clear').classList.remove('active');
  document.getElementById('overlay-preview').classList.remove('active');
  showScreen('screen-setup');
  updateHsDisplay();
});

document.getElementById('btn-retry-same').addEventListener('click', () => {
  document.getElementById('overlay-clear').classList.remove('active');
  showPreviewThenStart(State.imageUrl, State.gridSize);
});

document.getElementById('btn-new-game').addEventListener('click', () => {
  Timer.stop();
  document.getElementById('overlay-clear').classList.remove('active');
  showScreen('screen-setup');
  updateHsDisplay();
});

document.getElementById('board').addEventListener('contextmenu', e => e.preventDefault());

// =====================================================
//  Confetti
// =====================================================
function showConfetti() {
  const colors = ['#fbbf24','#f472b6','#a78bfa','#60a5fa','#34d399','#fb923c'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    el.style.width = (6 + Math.random() * 6) + 'px';
    el.style.height = (8 + Math.random() * 8) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// =====================================================
//  HS Display (Setup Screen)
// =====================================================
function updateHsDisplay() {
  const el = document.getElementById('hs-display');
  if (!el) return;
  const best = HighScore.get(State.gridSize);
  if (!best) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="hs-item"><span class="hs-item-label">スコア</span><span class="hs-item-val">${best.score.toLocaleString('ja-JP')}</span></div>
    <div class="hs-item"><span class="hs-item-label">手数</span><span class="hs-item-val">${best.moves}</span></div>
    <div class="hs-item"><span class="hs-item-label">タイム</span><span class="hs-item-val">${formatTime(best.ms)}</span></div>
  `;
}
updateHsDisplay();
